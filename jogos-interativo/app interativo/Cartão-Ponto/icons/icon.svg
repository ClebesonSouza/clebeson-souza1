<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#2a6eb6"/>
    </linearGradient>
  </defs>
  <!-- Fundo -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Relógio -->
  <circle cx="256" cy="232" r="138" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="22"/>
  <!-- Marcadores de hora -->
  <line x1="256" y1="112" x2="256" y2="144" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="376" y1="232" x2="344" y2="232" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="256" y1="352" x2="256" y2="320" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="136" y1="232" x2="168" y2="232" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- Ponteiro de hora (10h) -->
  <line x1="256" y1="232" x2="198" y2="164" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <!-- Ponteiro de minuto (12h) -->
  <line x1="256" y1="232" x2="256" y2="142" stroke="white" stroke-width="15" stroke-linecap="round"/>
  <!-- Centro -->
  <circle cx="256" cy="232" r="14" fill="white"/>
  <!-- Cartão de ponto embaixo -->
  <rect x="148" y="402" width="216" height="72" rx="14" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.7)" stroke-width="4"/>
  <rect x="168" y="420" width="176" height="10" rx="5" fill="white"/>
  <rect x="168" y="442" width="110" height="10" rx="5" fill="rgba(255,255,255,0.55)"/>
</svg>
