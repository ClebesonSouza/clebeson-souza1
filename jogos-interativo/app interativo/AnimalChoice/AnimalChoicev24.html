<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AnimalChoice</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0d1b2a; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      min-height:100vh; font-family:'Arial Rounded MT Bold',Arial,sans-serif; overflow:hidden;
    }
    #gameWrapper { position:relative; width:800px; }
    #gameCanvas { display:block; border-radius:16px 16px 0 0; box-shadow:0 0 40px rgba(0,200,255,0.25); }
    #ui {
      background:linear-gradient(135deg,#1e3c72,#2a5298);
      border-radius:0 0 16px 16px; padding:10px 12px;
      display:flex; gap:8px; justify-content:center;
    }
    .cbtn {
      background:rgba(255,255,255,0.08); border:3px solid rgba(255,255,255,0.2);
      border-radius:14px; padding:6px 10px; cursor:pointer; color:white;
      font-family:inherit; transition:all 0.2s;
      display:flex; flex-direction:column; align-items:center;
      min-width:100px; position:relative;
    }
    .cbtn:hover:not(.locked) { transform:scale(1.05); background:rgba(255,255,255,0.15); }
    .cbtn.active { border-color:#FFD700; background:rgba(255,215,0,0.18); box-shadow:0 0 18px rgba(255,215,0,0.5); transform:scale(1.08); }
    .cbtn.locked { opacity:0.65; cursor:not-allowed; }
    .cbtn .em { font-size:28px; }
    .cbtn .cn { font-size:12px; font-weight:bold; margin-top:2px; }
    .cbtn .ca { font-size:10px; color:#aef; margin-top:2px; }
    .cbtn .ck { font-size:9px; color:rgba(255,255,255,0.4); margin-top:1px; }
    .lock-overlay {
      position:absolute; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.55); border-radius:11px;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    }
    .lock-overlay span:first-child { font-size:22px; }
    .lock-overlay span:last-child { font-size:8px; color:rgba(255,255,255,0.8); text-align:center; line-height:1.3; }
  
  #muteBtn {
    position: fixed; top: 10px; right: 10px;
    background: rgba(0,0,0,0.55); color: #fff;
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 50%; width: 38px; height: 38px;
    font-size: 18px; cursor: pointer; z-index: 999;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  #muteBtn:hover { background: rgba(0,0,0,0.8); }


    /* ── TOUCH D-PAD ── */
    #touchControls {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 130px;
      pointer-events: none;
      z-index: 100;
      padding: 0 12px 10px;
      box-sizing: border-box;
      justify-content: space-between;
      align-items: flex-end;
    }

    .tpad-left, .tpad-right {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      pointer-events: all;
    }
    .tbtn {
      width: 64px; height: 64px;
      background: rgba(255,255,255,0.15);
      border: 2.5px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
      transition: background 0.1s, transform 0.1s;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      -webkit-tap-highlight-color: transparent;
    }
    .tbtn.pressed {
      background: rgba(255,215,0,0.35);
      border-color: #FFD700;
      transform: scale(0.92);
    }
    .tbtn-jump { width: 72px; height: 72px; font-size: 30px; background: rgba(255,100,100,0.18); border-color: rgba(255,100,100,0.5); }
    .tbtn-dig  { width: 56px; height: 56px; font-size: 22px; background: rgba(100,200,100,0.18); border-color: rgba(100,200,100,0.5); }
    .tbtn-jump.pressed { background: rgba(255,100,100,0.5); border-color: #FF6464; }
    .tbtn-dig.pressed  { background: rgba(100,200,100,0.5); border-color: #64FF64; }



    /* ══════════════════════════════════════════
       RESPONSIVIDADE: LANDSCAPE FORÇADO MOBILE
       ══════════════════════════════════════════ */
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d1b2a;
      touch-action: none;
      -webkit-touch-callout: none;
    }
    /* Garante que canvas escalado não cause scroll */
    #gameWrapper { overflow: hidden; }

    /* Wrapper fixo e escalado via JS */
    #gameWrapper {
      position: fixed;
      top: 0; left: 0;
      transform-origin: top left;
    }

    /* ── OVERLAY "GIRE O CELULAR" ── */
    #rotateOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0d1b2a;
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #rotateOverlay .rot-icon {
      font-size: 72px;
      animation: rotAnim 1.5s ease-in-out infinite;
    }
    #rotateOverlay .rot-text {
      color: #FFD700;
      font: bold 22px Arial Rounded MT Bold, Arial, sans-serif;
      text-align: center;
      line-height: 1.5;
    }
    #rotateOverlay .rot-sub {
      color: rgba(255,255,255,0.6);
      font: 14px Arial;
      text-align: center;
    }
    @keyframes unlockPulse {
      0%   { box-shadow: 0 0 0px #FFD700; transform: scale(1); }
      50%  { box-shadow: 0 0 18px 6px #FFD700; transform: scale(1.18); }
      100% { box-shadow: 0 0 0px #FFD700; transform: scale(1); }
    }
    .tbtn-unlocked {
      animation: unlockPulse 0.6s ease-in-out infinite;
      border-color: #FFD700 !important;
      background: rgba(255,215,0,0.3) !important;
    }
    #unlockToast {
      display: none;
      position: fixed;
      bottom: 200px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 2.5px solid #FFD700;
      border-radius: 16px;
      padding: 10px 22px;
      color: #FFD700;
      font: bold 15px Arial Rounded MT Bold, Arial, sans-serif;
      text-align: center;
      z-index: 2000;
      white-space: nowrap;
      box-shadow: 0 0 24px rgba(255,215,0,0.5);
    }
    @keyframes rotAnim {
      0%   { transform: rotate(0deg); }
      40%  { transform: rotate(90deg); }
      60%  { transform: rotate(90deg); }
      100% { transform: rotate(0deg); }
    }

    /* ── D-PAD: fixo na viewport ── */
    #touchControls {
      display: none; /* JS controla */
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      pointer-events: none;
      z-index: 1000;
      padding: 0 16px 12px;
      box-sizing: border-box;
      justify-content: space-between;
      align-items: flex-end;
    }

    @media (max-width: 820px) {
      #muteBtn { top: 4px; right: 4px; width: 30px; height: 30px; font-size: 14px; }
    }
</style>

// ══════════════════════════════════════════════════════
//  SISTEMA DE ÁUDIO — Web Audio API (corrigido)
// ══════════════════════════════════════════════════════
var audioCtx = null;
var soundEnabled = true;
var audioUnlocked = false;

// Inicializa e desbloqueia AudioContext no primeiro gesto do usuário
function unlockAudio(){
  if(audioUnlocked) return;
  try {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume().then(function(){ audioUnlocked = true; });
  } catch(e){}
}
document.addEventListener('keydown', unlockAudio, {once: false});
document.addEventListener('click',   unlockAudio, {once: false});
document.addEventListener('touchstart', unlockAudio, {once: false});

function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, volume, startFreq){
  if(!soundEnabled || !audioUnlocked) return;
  try {
    var ctx = getAudioCtx();
    var osc  = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(startFreq || freq, ctx.currentTime);
    if(startFreq) osc.frequency.exponentialRampToValueAtTime(freq, ctx.currentTime + duration);
    gain.gain.setValueAtTime(volume || 0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration + 0.01);
  } catch(e){}
}

function playNoise(duration, volume, filterFreq){
  if(!soundEnabled || !audioUnlocked) return;
  try {
    var ctx     = getAudioCtx();
    var bufSize = Math.floor(ctx.sampleRate * duration);
    var buf     = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    var data    = buf.getChannelData(0);
    for(var i=0;i<bufSize;i++) data[i] = (Math.random()*2-1);
    var src    = ctx.createBufferSource();
    src.buffer = buf;
    var filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = filterFreq || 400;
    filter.Q.value = 0.8;
    var gain = ctx.createGain();
    gain.gain.setValueAtTime(volume || 0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    src.start(ctx.currentTime);
    src.stop(ctx.currentTime + duration + 0.01);
  } catch(e){}
}

// ── Sons individuais ─────────────────────────────────
function sndStar(){
  // Inspirado no som da moeda do Super Mario — 2 notas 8-bit (onda quadrada)
  playTone(988, 'square', 0.07, 0.28);                           // Si5 — ataque curto
  setTimeout(function(){ playTone(1319,'square',0.14,0.24); }, 70); // Mi6 — resolução brilhante
}

function sndDig(){
  // Escavação Tatuzinho — terra pesada + vibração (sawtooth + LFO)
  var ctx = getAudioCtx();
  if(!ctx || !audioUnlocked || !soundEnabled) return;
  try {
    // Raspagem grave com tremulação
    var osc = ctx.createOscillator();
    var lfo = ctx.createOscillator();
    var gain = ctx.createGain();
    var filter = ctx.createBiquadFilter();

    osc.type = 'sawtooth';
    lfo.type = 'sine';
    lfo.frequency.value = 8; // LFO lento para vibração

    osc.frequency.value = 120;
    lfo.connect(osc.frequency);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);

    // Envelope agressivo
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.02, ctx.currentTime + 0.12);

    // Filtro para tom de terra
    filter.type = 'lowpass';
    filter.frequency.value = 400;

    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.12);
    lfo.start(ctx.currentTime);
    lfo.stop(ctx.currentTime + 0.12);



                      // Partículas de terra, adiciona um ruído de impacto com atraso para dar pAeso à escavação


    setTimeout(function(){ playNoise(0.08, 0.12, 180); }, 40); // Ruído de impacto com filtro grave para simular terra sendo levantada

  } catch(e){} // O bloco try/catch é usado para evitar erros em navegadores que não suportam a Web Audio API ou se o áudio não foi desbloqueado, garantindo que o jogo continue funcionando mesmo sem som.
}


function sndWater(){// Som de água — bolhas subindo + respingos (ruído branco filtrado)
  playNoise(0.25, 0.18, 600);// Ruído de bolhas com filtro mais agudo
  playTone(320,'sine',0.2,0.08,800);// Tom de respingo com slide descendente para dar sensação de água sendo perturbada
}

function sndSpeedGate(){//
  playTone(600,'sine',0.15,0.12,300);// Tom inicial mais grave para sensação de aceleração, deslizando para um tom mais agudo
  setTimeout(function(){ playTone(900,'sine',0.1,0.10); },80);// Tom de passagem rápida, mais curto e agudo para dar sensação de velocidade sendo alcançada
}

function sndUnlock(){// Som de desbloqueio — acorde maior simples para sensação de conquista
  playTone(523,'sine',0.12,0.18);// Dó5 — nota base do acorde

function sndJump(){

  playTone(294, 'square', 0.12, 0.22);  // D4 — início do pulo

  // Subida RÁPIDA: D# → F → G4

  setTimeout(function(){ playTone(349,'square',0.05,0.17); }, 170);  // F4
  setTimeout(function(){ playTone(392,'square',0.08,0.16); }, 200);  // G4 — fim do salto
}

}

  setTimeout(function(){ playTone(392,'square',0.15,0.18); },220); setTimeout(function(){ playTone(523,'square',0.18,0.22); },330);

  playTone(392,'square',0.1,0.12);// Sol4 — tom

}

  playTone(220,'sine',0.12,0.12);

"use strict";// Ativa o modo estrito para evitar erros silenciosos e impor boas práticas de codificação
var canvas = document.getElementById('gameCanvas');// Obtém o elemento canvas do DOM para desenhar o jogo
var ctx = canvas.getContext('2d');// Obtém o contexto 2D do canvas, que é usado para desenhar formas, imagens e texto no canvas
var CW=800, CH=440, GY=370, GRAV=0.55;// Define constantes para a largura do canvas (CW), altura do canvas (CH), posição do chão (GY) e gravidade (GRAV) que afeta a física do jogo
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

};

// ── State ────────────────────────────────────────────────────────────────────
var state='menu', phase=1, camX=0, score=0, lives=3, webStuck=0;
var catUnlocked=false, isDigging=false, DIG_Y=GY+14;
var particles=[];
var duckFlapTimer=0;   // conta frames da animacao de asa do patinho
var frogUnlocked=false, frogLongJump=false, frogTongue=0;
var caterpillarUnlocked=false, caterpillarBarrierStarsCollected=0;

var metamorphState='none', metamorphTimer=0, metamorphCountdown=3;
var p6Leaves=[], leavesEaten=0, TOTAL_LEAVES=20;

// ── Input ────────────────────────────────────────────────────────────────────
var K={};
window.addEventListener('keydown',function(e){
  K[e.key]=true;
  if(e.key==='1') switchChar('cat');
  if(e.key==='2') switchChar('dog');
  if(e.key==='3') switchChar('duck');
  if(e.key==='4') switchChar('bird');
  if(e.key==='5' && catUnlocked) switchChar('tatu');
  if(e.key==='6' && frogUnlocked) switchChar('frog');
  if(e.key==='7'){ if(butterflyUnlocked) switchChar('butterfly'); else if(caterpillarUnlocked) switchChar('caterpillar'); }
  if((e.key===' '||e.key==='ArrowUp') && state==='playing' && !isDigging){
    if(pl.char==='frog' && !pl.onGround && frogLongJump < 2){ // PULO DUPLO DO SAPINHO!
      pl.vy = -6; frogLongJump++; sndJump();
    } else if(pl.char==='duck'){
      if(pl.inWaterPit){
        // Inside water pit: duck swims up freely (handled in update physics)
        pl.vy=-4; // impulso de subida dentro da agua
      } else if(pl.onGround){
        // Outside water: flap wings but NO jump
        duckFlapTimer=30;
      }
    } else if(pl.onGround){
      pl.vy=CHARS[pl.char].jumpF; sndJump(); pl.onGround=false;
      if(pl.char==='frog'){ frogLongJump=1; sndCroac(); } // Primeiro pulo
    }
  }
  if(e.key==='ArrowDown' && state==='playing' && pl.char==='tatu' && pl.onGround && !isDigging) startDig();
  if((e.key===' '||e.key==='ArrowUp') && isDigging) stopDig();
  if(e.key===' ' && state==='menu') startGame();
  if(e.key===' ' && (state==='win'||state==='gameover')) state='menu';
  if(e.key===' ' && state==='phase2intro') beginPhase2();
  if(e.key===' ' && state==='phase3intro') beginPhase3();
  if(e.key===' ' && state==='phase4intro') beginPhase4();
  if(e.key===' ' && state==='phase5intro') beginPhase5();
  if(e.key===' ' && state==='phase6intro') beginPhase6();
});

function switchChar(c){
  if(c==='caterpillar'&&butterflyUnlocked) c='butterfly';
  if(c==='tatu'&&!catUnlocked) return;
  if(c==='frog'&&!frogUnlocked) return;
  if((c==='caterpillar'||c==='butterfly')&&!caterpillarUnlocked) return;
  if(isDigging&&c!=='tatu') stopDig();
  pl.char=c;
  
  // Ajusta dimensões da hitbox conforme o personagem
  if(c==='caterpillar'){
    pl.w=48; pl.h=52; // Lagartinha maior e mais baixa: 48x52
  } else {
    pl.w=38; pl.h=38; // Outros personagens: tamanho padrão
  }
  
  document.querySelectorAll('.cbtn').forEach(function(b){b.classList.remove('active');});
  var btnId=(c==='butterfly')?'btn-caterpillar':'btn-'+c;
  document.getElementById(btnId).classList.add('active');
}

  isDigging=false; pl.y=GY-pl.h; pl.vy=0; pl.onGround=true;
  for(var i=0;i<12;i++) spawnDirt(pl.x+pl.w/2,GY);
}

function groundAt(x){// funcao para verificar se tem chao em determinada posicao x, usada para detectar se o jogador esta no chao ou caindo em um buraco, a funcao verifica se a posicao x esta dentro de algum dos buracos (gaps) ou buracos d'agua (waterPits) da fase atual, se estiver dentro de algum desses elementos, significa que nao tem chao naquela posicao e a funcao retorna false, caso contrario, retorna true, indicando que tem chao naquela posicao
  var lv=getLevel();// pega os dados da fase atual para verificar os buracos e buracos d'agua da fase atual
  var i;// verifica se a posicao x esta dentro de algum dos buracos (gaps) da fase atual
  for(i=0;i<lv.gaps.length;i++) if(x>lv.gaps[i].x&&x<lv.gaps[i].x+lv.gaps[i].w) return false;// verifica se a posicao x esta dentro de algum dos buracos d'agua (waterPits) da fase atual
  for(i=0;i<lv.waterPits.length;i++) if(x>lv.waterPits[i].x&&x<lv.waterPits[i].x+lv.waterPits[i].w) return false;// se a posicao x nao estiver dentro de nenhum buraco ou buraco d'agua, significa que tem chao naquela posicao, entao a funcao
  if(lv.frogGaps) for(i=0;i<lv.frogGaps.length;i++) if(x>lv.frogGaps[i].x&&x<lv.frogGaps[i].x+lv.frogGaps[i].w) return false;
  return true;
}

function update(){
  if(state!=='playing') return;
  var def=CHARS[pl.char], lv=getLevel(), sts=getStars(), i;

  // Duck flap timer
  if(duckFlapTimer>0) duckFlapTimer--;

  // Particles
  for(i=particles.length-1;i>=0;i--){
    var pt=particles[i];
    pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.2; pt.life--;
    if(pt.life<=0) particles.splice(i,1);
  }

  if(isDigging&&pl.char!=='tatu') stopDig();
  if(isDigging && !groundAt(pl.x + pl.w/2)){ stopDig(); }

  // Water pit detection
  pl.inWaterPit=false;
  var activePit=null;
  for(i=0;i<lv.waterPits.length;i++){
    var wp=lv.waterPits[i];
    if(pl.x+pl.w>wp.x&&pl.x<wp.x+wp.w){
      pl.inWaterPit=true; activePit=wp;
    }
  }

  // Horizontal movement
  if(pl.char==='frog'&&frogLongJump&&!pl.onGround){
    if(K['ArrowLeft']||K['a']) pl.vx=-10;
    else if(K['ArrowRight']||K['d']) pl.vx=10;
    else pl.vx=0;
  } else {
    if(K['ArrowLeft']||K['a']) pl.vx=-def.spd;
    else if(K['ArrowRight']||K['d']) pl.vx=def.spd;
    else pl.vx=0;
  }

  // Vertical physics
  if(isDigging){
    pl.y=DIG_Y; pl.vy=0; pl.onGround=false;
  } else if(def.swim&&pl.inWaterPit&&pl.y+pl.h>GY-10){
    // Duck swimming in water pit — can go up to collect stars
    pl.vy=(K['ArrowUp']||K[' '])?-4.5:1.8;
    if(pl.y>GY+55) pl.y=GY+55;
    // No upper cap — duck can rise to collect stars near top of pit
  } else if(!def.swim&&!isDigging&&pl.inWaterPit&&pl.y+pl.h>GY-5){
    // Non-duck in water: sink fast
    pl.vy+=GRAV*3.5;
    if(Math.random()<0.35) spawnBubble(pl.x+pl.w/2-camX+camX,pl.y+pl.h/2);
    if(pl.y>GY+70) respawn();
  } else if(def.fly&&(K['ArrowUp']||K[' '])){
    pl.vy=-3.5; pl.onGround=false;
  } else {
    pl.vy+=def.grav;
  }

  pl.x+=pl.vx; pl.y+=pl.vy;
  if(pl.x<0) pl.x=0;
  pl.onGround=false;

  if(!isDigging){
    // Ground
    if(pl.y+pl.h>=GY&&groundAt(pl.x+pl.w/2)){
      pl.y=GY-pl.h; pl.vy=0; pl.onGround=true; frogLongJump=0; // RESET PULO DUPLO
    }
    // Platforms
    for(i=0;i<lv.platforms.length;i++){
      var p=lv.platforms[i];
      if(pl.x+pl.w>p.x&&pl.x<p.x+p.w&&pl.y+pl.h>p.y&&pl.y+pl.h<p.y+p.h+12&&pl.vy>=0){
        pl.y=p.y-pl.h; pl.vy=0; pl.onGround=true; frogLongJump=0; // RESET PULO DUPLO
      }
    }
    // Normal walls
    for(i=0;i<lv.walls.length;i++){
      var w=lv.walls[i];
      if(pl.x+pl.w>w.x&&pl.x<w.x+w.w&&pl.y+pl.h>w.y&&pl.y<w.y+w.h){
        if(pl.vx>0) pl.x=w.x-pl.w; else if(pl.vx<0) pl.x=w.x+w.w;
        pl.vx=0;
      }
    }
    // Mega barriers
    for(i=0;i<lv.megaBarriers.length;i++){
      var mb=lv.megaBarriers[i];
      if(pl.x+pl.w>mb.x&&pl.x<mb.x+mb.w&&pl.y+pl.h>mb.y&&pl.y<mb.y+mb.h){
        if(pl.vx>0) pl.x=mb.x-pl.w; else if(pl.vx<0) pl.x=mb.x+mb.w;
        pl.vx=0;
      }
    }
    // Water pit CEILING — FIX #1 (sem paredes laterais) + FIX #2 (sem condicao vy)
    // Fix #1: paredes laterais removidas → Patinho entra livremente pelo buraco no chao
    // Fix #2: tecto bloqueia qualquer direcao de voo → Passarinho nao sobrevoa
    for(i=0;i<lv.waterPits.length;i++){
      var wp2=lv.waterPits[i];
      if(pl.x+pl.w>wp2.x&&pl.x<wp2.x+wp2.w){
        // Bloqueia qualquer animal acima do tecto (cobre de y=0 ate ceilY+ceilH)
        if(pl.y<wp2.ceilY+wp2.ceilH){
          pl.y=wp2.ceilY+wp2.ceilH;
          if(pl.vy<0) pl.vy=0; // para impulso de subida
        }
        // PAREDES LATERAIS REMOVIDAS — animais caem pelo buraco naturalmente
      }
    }
    // Frog gap ceiling (bloqueia passarinho)
    if(lv.frogGaps){ for(i=0;i<lv.frogGaps.length;i++){
      var fg2=lv.frogGaps[i];
      if(pl.x+pl.w>fg2.x&&pl.x<fg2.x+fg2.w){
        if(pl.y<fg2.ceilY+fg2.ceilH){ pl.y=fg2.ceilY+fg2.ceilH; if(pl.vy<0) pl.vy=0; }
      }
    }}
    // Speed gates
    for(i=0;i<lv.speedGates.length;i++){
      var sg=lv.speedGates[i];
      if(!sg.passed&&pl.x+pl.w>sg.x&&pl.x<sg.x+sg.w&&pl.y+pl.h>sg.y&&pl.y<sg.y+sg.h){
        if(def.spd>=9){sg.passed=true; sndSpeedGate();score+=20;}
        else{pl.x=sg.x-pl.w; pl.vx=0;}
      }
    }
  }

  // Stars
  for(i=0;i<sts.length;i++){
    var s=sts[i];
    if(!s.got&&Math.abs(pl.x+pl.w/2-s.x)<s.r+14&&Math.abs(pl.y+pl.h/2-s.y)<s.r+14){
      s.got=true; score+=10; sndStar();
    }
  }
  
  // P5 barrier stars (hidden stars underground)
  if(phase===5){
    for(i2=0;i2<p5BarrierStars.length;i2++){
      var bs=p5BarrierStars[i2];
      if(!bs.got&&Math.abs(pl.x+pl.w/2-bs.x)<bs.r+16&&Math.abs(pl.y+pl.h/2-bs.y)<bs.r+16){
        bs.got=true; score+=10; sndStar();
        var allBarrier=p5BarrierStars.every(function(s){return s.got;});
        if(allBarrier&&!caterpillarUnlocked) unlockCaterpillarButterfly();
      }
    }
  }

  // P3 unlock stars + insetos
  if(phase===3){
    var i2;
    for(i2=0;i2<p3UnlockStars.length;i2++){
      var us=p3UnlockStars[i2];
      if(!us.got&&Math.abs(pl.x+pl.w/2-us.x)<us.r+16&&Math.abs(pl.y+pl.h/2-us.y)<us.r+16){
        us.got=true; score+=10; sndStar();
        var allUnlock=p3UnlockStars.every(function(s){return s.got;});
        if(allUnlock&&!frogUnlocked) unlockFrog();
      }
    }
    for(i2=0;i2<p3Insects.length;i2++){
      var ins=p3Insects[i2]; if(ins.eaten) continue;
      ins.x+=ins.vx;
      if(ins.x<ins.minX||ins.x>ins.maxX) ins.vx=-ins.vx;
      if(pl.x+pl.w>ins.x&&pl.x<ins.x+ins.w&&pl.y+pl.h>ins.y&&pl.y<ins.y+ins.h){
        if(pl.char==='frog'){ ins.eaten=true; score+=15; sndEat(); frogTongue=18;
          for(var bi=0;bi<8;bi++) spawnBubble(ins.x+ins.w/2,ins.y+ins.h/2);
        } else { sndHit(); respawn(); }
      }
    }
  }

  // P4 flying insects + webs (insetos voadores e teias de aranha)
  if(phase===4){
    // Insetos voadores - movimento vertical senoidal
    for(var fi=0;fi<p4FlyingInsects.length;fi++){
      var fins=p4FlyingInsects[fi]; if(fins.eaten) continue;
      fins.y += fins.vy;
      if(Math.abs(fins.y - fins.baseY) > fins.amp) fins.vy = -fins.vy;
      if(pl.x+pl.w>fins.x&&pl.x<fins.x+fins.w&&pl.y+pl.h>fins.y&&pl.y<fins.y+fins.h){
        if(pl.char==='frog'){ fins.eaten=true; score+=20; sndEat(); frogTongue=25; // LÍNGUA MAIOR!
          for(var bi=0;bi<10;bi++) spawnBubble(fins.x+fins.w/2,fins.y+fins.h/2);
        } else { sndHit(); respawn(); }
      }
    }
    // Teias de aranha como obstáculos - colisão com jogador
    for(var wi=0;wi<p4Webs.length;wi++){
      var web=p4Webs[wi];
      if(pl.x+pl.w>web.x&&pl.x<web.x+web.w&&pl.y+pl.h>web.y&&pl.y<web.y+web.h){
        // Teia desacelera o jogador e pode prender por um momento
        pl.vx *= 0.7; // Reduz velocidade horizontal
        if(Math.random()<0.3) pl.vy = Math.min(pl.vy, -2); // Pode dar um pequeno impulso para cima
      }
    }
  }

  // P5 insects + barrier logic (Sapinho come insetos, Tatuzinho entra na barreira)
  if(phase===5){
    // Insetos da Fase 5 - Sapinho come
    for(var ii=0;ii<p5Insects.length;ii++){
      var inst=p5Insects[ii]; if(inst.eaten) continue;
      inst.x+=inst.vx;
      if(inst.x<inst.minX||inst.x>inst.maxX) inst.vx=-inst.vx;
      if(pl.x+pl.w>inst.x&&pl.x<inst.x+inst.w&&pl.y+pl.h>inst.y&&pl.y<inst.y+inst.h){
        if(pl.char==='frog'){ inst.eaten=true; score+=15; sndEat();
          for(var bi=0;bi<8;bi++) spawnBubble(inst.x+inst.w/2,inst.y+inst.h/2);
        } else { sndHit(); respawn(); }
      }
    }
    
    // (Desbloqueio da Lagartinha agora é feito ao coletar all p5BarrierStars acima)
  }

  // ── Fase 6 ──────────────────────────────────────────────────────────────────
  if(phase===6){
    if(metamorphState!=='none'&&metamorphState!=='done'){
      pl.vx=0;
      if(metamorphState==='cocooning'){
        metamorphTimer++;
        if(metamorphTimer>=80){metamorphState='countdown';metamorphTimer=0;metamorphCountdown=3;}
      }else if(metamorphState==='countdown'){
        metamorphTimer++;
        if(metamorphTimer%60===0&&metamorphCountdown>0) metamorphCountdown--;
        if(metamorphCountdown===0&&metamorphTimer>=70){
          metamorphState='burst'; metamorphTimer=0;
          var bC=['#FF69B4','#FFD700','#7FFF00','#00BFFF','#FF6347','#DA70D6','#fff'];
          for(var bi=0;bi<70;bi++) particles.push({x:pl.x+pl.w/2,y:pl.y+pl.h/2,vx:(Math.random()-0.5)*10,vy:-Math.random()*8-1,life:100,color:bC[Math.floor(Math.random()*bC.length)],type:'burst'});
          sndVictory();
          pl.char='butterfly'; pl.w=38; pl.h=38; butterflyUnlocked=true;
          document.querySelector('#btn-caterpillar .em').textContent='🦋';
          document.querySelector('#btn-caterpillar .cn').textContent='Borboleta!';
          document.querySelector('#btn-caterpillar .ca').textContent='Pairar';
        }
      }else if(metamorphState==='burst'){
        metamorphTimer++;
        if(metamorphTimer>=100) metamorphState='done';
      }
    }
    if(pl.char==='caterpillar'&&metamorphState==='none'){
      for(var li=0;li<p6Leaves.length;li++){
        var lf=p6Leaves[li]; if(lf.eaten) continue;
        lf.wobble=(lf.wobble||0)+0.05;
        if(Math.abs(pl.x+pl.w/2-lf.x)<22&&Math.abs(pl.y+pl.h/2-lf.y)<22){
          lf.eaten=true; leavesEaten++; score+=8; sndEat();
          for(var pi=0;pi<6;pi++) particles.push({x:lf.x,y:lf.y,vx:(Math.random()-0.5)*4,vy:-Math.random()*3-1,life:30,color:'#7FFF00',type:'leaf'});
          if(leavesEaten>=TOTAL_LEAVES) metamorphState='cocooning';
        }
      }
    }
    if(pl.char==='butterfly'&&(K['ArrowUp']||K['w'])&&!pl.onGround&&pl.vy>-1){
      pl.vy=Math.min(pl.vy,0.5);
    }
  }
  // Finish
  if(pl.x+pl.w>lv.finish.x){
    if(phase===1){
      var all=p1Stars.every(function(s){return s.got;});
      if(all&&!catUnlocked) unlockCaterpillar();
      state='phase2intro';
    } else if(phase===2){ state='phase3intro';
    } else if(phase===3){ state='phase4intro'; // NOVA TRANSIÇÃO PARA FASE 4
    } else if(phase===4){ state='phase5intro'; // NOVA TRANSIÇÃO PARA FASE 5
    } else if(phase===5){ state='phase6intro';
    } else { state='win'; sndVictory(); }
  }

  if(pl.y>CH+80) respawn();
  camX=Math.max(0,Math.min(pl.x-CW/3,WORLD-CW));
}

  ctx.fill();
}
function drawTree(x,ph){
  ctx.fillStyle=ph===2?'#37474F':'#5D4037'; ctx.fillRect(x-7,GY-48,14,48);
  ctx.fillStyle=ph===2?'#2E7D32':'#388E3C'; ctx.beginPath(); ctx.arc(x,GY-65,32,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=ph===2?'#388E3C':'#43A047'; ctx.beginPath(); ctx.arc(x,GY-80,20,0,Math.PI*2); ctx.fill();
}
function drawBG(){
  var ph=phase;
  var sg=ctx.createLinearGradient(0,0,0,CH);
  sg.addColorStop(0,ph===5?'#87CEEB':ph===4?'#0D1B2A':ph===3?'#0A0E1A':ph===2?'#546E7A':'#87CEEB'); // FASE 5: azul claro (dia)
  sg.addColorStop(1,ph===5?'#90EE90':ph===4?'#1B4332':ph===3?'#0D2137':ph===2?'#37474F':'#E0F7FA'); // FASE 5: verde claro (grama)
  ctx.fillStyle=sg; ctx.fillRect(0,0,CW,CH);
  if(ph===5){
    // SOL brilhante no canto superior direito
    ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(CW-80,70,50,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,215,0,0.3)'; ctx.beginPath(); ctx.arc(CW-80,70,75,0,Math.PI*2); ctx.fill();
    
    // CAMPO DE FLORES FIXAS NO CHÃO (jardim)
    var flowerPositions = [150, 350, 550, 850, 1150, 1450, 1750, 2050, 2350, 2650, 2950, 3250, 3550, 3850, 4150, 4450, 4750, 5050, 5350];
    for(var i=0; i<flowerPositions.length; i++){
      var fx = flowerPositions[i] - camX;
      if(fx > -50 && fx < CW + 50){
        // Talos das flores
        ctx.strokeStyle='#228B22'; ctx.lineWidth=2; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(fx, GY); ctx.lineTo(fx, GY-15); ctx.stroke();
        
        // Flor (pétalas rosadas)
        var colors = ['#FF69B4', '#FF1493', '#FFB6C1', '#FF69B4', '#FF1493'];
        ctx.fillStyle = colors[i % colors.length];
        ctx.beginPath();
        ctx.arc(fx-4, GY-18, 3, 0, Math.PI*2); ctx.fill(); // Pétala esquerda
        ctx.beginPath();
        ctx.arc(fx+4, GY-18, 3, 0, Math.PI*2); ctx.fill(); // Pétala direita
        ctx.beginPath();
        ctx.arc(fx, GY-22, 3, 0, Math.PI*2); ctx.fill(); // Pétala cima
        ctx.beginPath();
        ctx.arc(fx, GY-14, 3, 0, Math.PI*2); ctx.fill(); // Pétala baixo
        
        // Centro da flor (amarelo)
        ctx.fillStyle='#FFD700';
        ctx.beginPath(); ctx.arc(fx, GY-18, 2, 0, Math.PI*2); ctx.fill();
      }
    }
  } else if(ph===4){
    // LUA CHEIA no canto superior direito
    ctx.fillStyle='rgba(255,255,240,0.95)'; ctx.beginPath(); ctx.arc(CW-100,80,45,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,220,0.3)'; ctx.beginPath(); ctx.arc(CW-100,80,65,0,Math.PI*2); ctx.fill();
    // VAGA-LUMES piscando
    var t4=Date.now()/600;
    for(var fl=0;fl<12;fl++){
      var fx=(200+fl*350-camX*0.3)%CW, fy=180+Math.sin(t4+fl*1.5)*50;
      var fa=0.3+0.6*Math.sin(t4*1.8+fl); ctx.globalAlpha=fa;
      ctx.fillStyle='#FFFF88'; ctx.beginPath(); ctx.arc(fx,fy,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,120,0.4)'; ctx.beginPath(); ctx.arc(fx,fy,10,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  } else if(ph===3){
    ctx.fillStyle='rgba(255,255,220,0.92)'; ctx.beginPath(); ctx.arc(CW-80,60,30,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,200,0.25)'; ctx.beginPath(); ctx.arc(CW-80,60,45,0,Math.PI*2); ctx.fill();
    var t3=Date.now()/800;
    for(var fl=0;fl<8;fl++){
      var fx=(180+fl*420-camX*0.25)%CW, fy=260+Math.sin(t3+fl*1.3)*40;
      var fa=0.4+0.5*Math.sin(t3*2+fl); ctx.globalAlpha=fa;
      ctx.fillStyle='#FFFF55'; ctx.beginPath(); ctx.arc(fx,fy,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,80,0.3)'; ctx.beginPath(); ctx.arc(fx,fy,8,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  ctx.fillStyle=ph===5?'rgba(200,255,200,0.3)':ph===4?'rgba(100,200,150,0.15)':ph===3?'rgba(100,180,255,0.12)':ph===2?'rgba(200,220,255,0.2)':'rgba(255,255,255,0.82)';
  [80,260,500,720,970,1300,1700,2100,2500,2900].forEach(function(cx){
    var sx=cx-camX*0.45; if(sx>-80&&sx<CW+80) cloud(sx,55+(cx%3)*25);
  });
  [140,320,520,730,1000,1250,1520,1800,2100,2400,2700,3000,3300,3600].forEach(function(tx){
    var sx=tx-camX*0.78; if(sx>-50&&sx<CW+50) drawTree(sx,ph);
  });
}
function drawGround(){
  var lv=getLevel(), startX=Math.floor(camX/38)*38;
  for(var gx=startX;gx<camX+CW+38;gx+=38){
    if(!groundAt(gx+19)) continue;
    var sx=gx-camX;
    ctx.fillStyle=phase===5?'#76B82A':phase===4?'#2D5A3D':phase===2?'#78909C':'#4CAF50'; // FASE 5: verde floresta
    ctx.fillRect(sx,GY,38,20);
    ctx.fillStyle=phase===5?'#9AD35F':phase===4?'#4A7C59':phase===2?'#90A4AE':'#66BB6A'; // FASE 5: verde claro
    ctx.fillRect(sx,GY,38,5);
    ctx.fillStyle=phase===4?'#1B4332':'#795548'; // FASE 4: marrom pântano
    ctx.fillRect(sx,GY+20,38,CH-GY-20);
  }
}
function drawPlatforms(){
  var lv=getLevel();
  for(var i=0;i<lv.platforms.length;i++){
    var p=lv.platforms[i], sx=p.x-camX;
    if(sx>CW||sx+p.w<0) continue;
    ctx.fillStyle=phase===5?'#76B82A':phase===4?'#2D5A3D':phase===2?'#607D8B':'#4CAF50'; // FASE 5: verde floresta
    ctx.fillRect(sx,p.y,p.w,p.h);
    ctx.fillStyle=phase===5?'#9AD35F':phase===4?'#4A7C59':phase===2?'#78909C':'#66BB6A'; // FASE 5: verde claro
    ctx.fillRect(sx,p.y,p.w,5);
  }
}
function drawWalls(){
  var lv=getLevel();
  for(var i=0;i<lv.walls.length;i++){
    var w=lv.walls[i], sx=w.x-camX;
    if(sx>CW||sx+w.w<0) continue;
    for(var by=w.y;by<w.y+w.h;by+=18)
      for(var bx=0;bx<w.w;bx+=18){
        ctx.fillStyle=(Math.floor((by-w.y)/18)+Math.floor(bx/18))%2===0?'#795548':'#6D4C41';
        ctx.fillRect(sx+bx,by,17,17);
      }
    ctx.fillStyle='rgba(0,0,0,0.45)'; rrect(sx+w.w/2-62,w.y-26,124,20,8); ctx.fill();
    ctx.fillStyle='white'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
    ctx.fillText('Use o Gatinho! [1]',sx+w.w/2,w.y-11);
  }
}

// ── Water Pits (the key mechanic!) ────────────────────────────────────────────
function drawWaterPits(){
  var lv=getLevel(), t=Date.now()/600;
  for(var i=0;i<lv.waterPits.length;i++){
    var wp=lv.waterPits[i], sx=wp.x-camX;
    if(sx>CW||sx+wp.w<0) continue;

    // ── Dark pit abyss
    ctx.fillStyle='#0a1520';
    ctx.fillRect(sx,GY,wp.w,CH-GY);

    // ── Water fill inside pit
    var wg=ctx.createLinearGradient(0,GY,0,GY+80);
    wg.addColorStop(0,'rgba(33,150,243,0.92)');
    wg.addColorStop(0.6,'rgba(21,101,192,0.97)');
    wg.addColorStop(1,'rgba(13,71,161,1)');
    ctx.fillStyle=wg;
    ctx.fillRect(sx,GY,wp.w,80);

    // ── Animated waves on water surface
    ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=2;
    for(var wx=sx;wx<sx+wp.w-10;wx+=20){
      ctx.beginPath();
      ctx.moveTo(wx,    GY+5+Math.sin(t+wx*0.09)*4);
      ctx.lineTo(wx+10, GY+5+Math.sin(t+wx*0.09+1.2)*4);
      ctx.stroke();
    }

    // ── Rock ceiling above pit (blocks bird from flying over)
    var rockGrad=ctx.createLinearGradient(0,wp.ceilY,0,wp.ceilY+wp.ceilH);
    rockGrad.addColorStop(0,'#263238'); rockGrad.addColorStop(1,'#455A64');//
    ctx.fillStyle=rockGrad;
    ctx.fillRect(sx,wp.ceilY,wp.w,wp.ceilH);
    // Rock texture lines
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
    for(var rx=sx;rx<sx+wp.w;rx+=18){
      ctx.beginPath(); ctx.moveTo(rx,wp.ceilY); ctx.lineTo(rx+9,wp.ceilY+wp.ceilH); ctx.stroke();
    }
    // Stalactites hanging from ceiling
    ctx.fillStyle='#37474F';
    for(var st=sx+15;st<sx+wp.w-10;st+=35){
      var sh=12+Math.sin(st)*5;
      ctx.beginPath();
      ctx.moveTo(st-7,wp.ceilY+wp.ceilH);
      ctx.lineTo(st+7,wp.ceilY+wp.ceilH);
      ctx.lineTo(st,wp.ceilY+wp.ceilH+sh);
      ctx.fill();
    }

    // ── Pit dirt walls (left and right edges)
    ctx.fillStyle='#5D4037';
    ctx.fillRect(sx-10,GY-5,10,CH-GY+5);
    ctx.fillRect(sx+wp.w,GY-5,10,CH-GY+5);
    // Soil texture stripes
    ctx.fillStyle='#6D4C41';
    for(var sy2=GY;sy2<CH;sy2+=18){
      ctx.fillRect(sx-10,sy2,10,8);
      ctx.fillRect(sx+wp.w,sy2,10,8);
    }

    // ── Hint label above pit
    ctx.fillStyle='rgba(0,0,0,0.6)';
    rrect(sx+wp.w/2-90,wp.ceilY-30,180,24,10); ctx.fill();
    ctx.strokeStyle='#FDD835'; ctx.lineWidth=1.5;
    rrect(sx+wp.w/2-90,wp.ceilY-30,180,24,10); ctx.stroke();
    ctx.fillStyle='#FDD835'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
    ctx.fillText('Apenas o Patinho nada! [3]',sx+wp.w/2,wp.ceilY-14);

    // ── Entry gap hint (opening between ceiling and pit walls)
    ctx.fillStyle='rgba(253,216,53,0.15)';
    ctx.fillRect(sx,wp.ceilY+wp.ceilH,wp.w,GY-(wp.ceilY+wp.ceilH));
    // Small arrow pointing down into water
    ctx.fillStyle='rgba(253,216,53,0.7)';
    ctx.font='18px Arial'; ctx.textAlign='center';
    ctx.fillText('v',sx+wp.w/2,wp.ceilY+wp.ceilH+20);
  }
}

function drawMegaBarriers(){
  var lv=getLevel();
  if(!lv.megaBarriers||!lv.megaBarriers.length) return;
  for(var i=0;i<lv.megaBarriers.length;i++){
    var mb=lv.megaBarriers[i], sx=mb.x-camX;
    if(sx>CW||sx+mb.w<0) continue;
    var grad=ctx.createLinearGradient(sx,0,sx+mb.w,0);
    grad.addColorStop(0,'#1a1a1a'); grad.addColorStop(0.5,'#37474F'); grad.addColorStop(1,'#1a1a1a');
    ctx.fillStyle=grad; ctx.fillRect(sx,0,mb.w,GY);
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1;
    for(var by=0;by<GY;by+=22)
      for(var bx=0;bx<mb.w;bx+=26){ ctx.strokeRect(sx+bx+(by%44<22?0:13),by,25,21); }
    for(var s2=0;s2<mb.w;s2+=12){
      ctx.fillStyle=(Math.floor(s2/12))%2===0?'#F44336':'#FFD700';
      ctx.fillRect(sx+s2,0,12,16);
    }
    ctx.fillStyle='#F44336'; rrect(sx+mb.w/2-80,GY/2-18,160,36,10); ctx.fill();
    ctx.strokeStyle='#FF8F00'; ctx.lineWidth=2; rrect(sx+mb.w/2-80,GY/2-18,160,36,10); ctx.stroke();
    ctx.fillStyle='white'; ctx.font='bold 13px Arial'; ctx.textAlign='center';
    ctx.fillText('Cave por baixo!',sx+mb.w/2,GY/2-2);
    ctx.font='11px Arial'; ctx.fillStyle='#FFD700';
    ctx.fillText('Tatuzinho [5] + Seta v',sx+mb.w/2,GY/2+14);
    ctx.fillStyle='rgba(102,187,106,0.3)'; ctx.fillRect(sx,GY,mb.w,30);
    ctx.fillStyle='#66BB6A'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
    ctx.fillText('TUNEL',sx+mb.w/2,GY+19);
  }
}
function drawGaps(){

  for(var i=0;i<lv.gaps.length;i++){
    var g=lv.gaps[i], sx=g.x-camX;
    if(sx>CW||sx+g.w<0) continue;

    ctx.fillStyle='rgba(0,0,0,0.45)'; rrect(sx+g.w/2-74,GY-24,148,18,8); ctx.fill();
    ctx.fillStyle='white'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
    ctx.fillText('Use o Passarinho! [4]',sx+g.w/2,GY-10);

}
function drawSpeedGates(){
  var lv=getLevel();
  for(var i=0;i<lv.speedGates.length;i++){
    var g=lv.speedGates[i]; if(g.passed) continue;
    var sx=g.x-camX; if(sx>CW||sx+g.w<0) continue;
    ctx.fillStyle='#FF7043'; ctx.fillRect(sx,g.y,g.w,g.h);
    ctx.fillStyle='rgba(0,0,0,0.45)'; rrect(sx+g.w/2-62,g.y-24,124,18,8); ctx.fill();
    ctx.fillStyle='white'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
    ctx.fillText('Corra rapido! [2]',sx+g.w/2,g.y-10);
  }
}
function drawStars(){
  var sts=getStars(), t=Date.now()/350;
  for(var i=0;i<sts.length;i++){
    var s=sts[i]; if(s.got) continue;
    var sx=s.x-camX; if(sx<-20||sx>CW+20) continue;
    var bob=Math.sin(t+s.x)*3;
    ctx.beginPath(); ctx.arc(sx,s.y+bob,s.r,0,Math.PI*2);
    ctx.fillStyle='#FFD700'; ctx.fill();
    ctx.strokeStyle='#FFA000'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#E65100'; ctx.font='bold 9px Arial'; ctx.textAlign='center';
    ctx.fillText('*',sx,s.y+bob+4);
  }
}
function drawFinish(){
  var fin=getLevel().finish, sx=fin.x-camX;
  if(sx>CW+60||sx<-60) return;
  ctx.fillStyle='#9E9E9E'; ctx.fillRect(sx,fin.y,fin.w,fin.h);
  ctx.fillStyle='#F44336';
  ctx.beginPath(); ctx.moveTo(sx+fin.w,fin.y); ctx.lineTo(sx+fin.w+48,fin.y+14); ctx.lineTo(sx+fin.w,fin.y+28); ctx.fill();
  ctx.fillStyle='#FFD700'; ctx.font='bold 15px Arial'; ctx.textAlign='center';
  ctx.fillText('META!',sx+26,fin.y-10);
}
function drawParticles(){
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.globalAlpha=p.life/40;
    if(p.type==='bubble'){
      ctx.strokeStyle=p.color; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(p.x-camX,p.y,4,0,Math.PI*2); ctx.stroke();
    } else {
      ctx.fillStyle=p.color; ctx.fillRect(p.x-camX-3,p.y-3,6,6);
    }
  }
  ctx.globalAlpha=1;
}
function drawDigTunnel(){
  if(!isDigging) return;
  var sx=pl.x-camX;
  ctx.fillStyle='rgba(93,64,55,0.7)'; ctx.fillRect(sx-8,GY,pl.w+16,DIG_Y-GY+pl.h+8);
  ctx.strokeStyle='rgba(141,110,99,0.6)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(sx-8,GY); ctx.lineTo(sx-8,DIG_Y+pl.h+8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx+pl.w+8,GY); ctx.lineTo(sx+pl.w+8,DIG_Y+pl.h+8); ctx.stroke();
}

// ── Draw Characters ───────────────────────────────────────────────────────────
function drawCat(cx,cy,def){
  var t=Date.now()/140;
  var run=Math.sin(t)*5;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.scale(0.85,0.85);

  // ── Rabo (curva elegante, balança) ────────────────────────────────────────
  var tailCurve=Math.sin(t*0.8)*6;
  ctx.strokeStyle=def.color; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-16,0);
  ctx.bezierCurveTo(-28,-4,-32,-16+tailCurve,-24,-26+tailCurve);
  ctx.stroke();
  // Pontinha escura do rabo
  ctx.strokeStyle=def.accent; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(-28,-18+tailCurve); ctx.lineTo(-24,-26+tailCurve);
  ctx.stroke();

  // ── Patas traseiras ───────────────────────────────────────────────────────
  ctx.strokeStyle=def.accent; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-10,5); ctx.lineTo(-13,16+run); ctx.lineTo(-16,22+run*0.3); ctx.stroke();
  ctx.fillStyle=def.accent;
  ctx.beginPath(); ctx.arc(-17,22+run*0.3,4,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#FFB74D'; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.moveTo(-5,5);  ctx.lineTo(-7,16-run);  ctx.lineTo(-9,22-run*0.3); ctx.stroke();
  ctx.fillStyle='#FFB74D';
  ctx.beginPath(); ctx.arc(-10,22-run*0.3,4,0,Math.PI*2); ctx.fill();

  // ── Patas dianteiras ──────────────────────────────────────────────────────
  ctx.strokeStyle=def.accent; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(8,4);   ctx.lineTo(9,15-run);  ctx.lineTo(11,22-run*0.3); ctx.stroke();
  ctx.fillStyle=def.accent;
  ctx.beginPath(); ctx.arc(12,22-run*0.3,4,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#FFB74D'; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.moveTo(12,4);  ctx.lineTo(15,15+run); ctx.lineTo(18,22+run*0.3); ctx.stroke();
  ctx.fillStyle='#FFB74D';
  ctx.beginPath(); ctx.arc(19,22+run*0.3,4,0,Math.PI*2); ctx.fill();

  // ── Corpo ─────────────────────────────────────────────────────────────────
  ctx.fillStyle=def.accent;
  ctx.beginPath();
  ctx.moveTo(-17,5); ctx.bezierCurveTo(-19,-5,-9,-13,5,-10);
  ctx.bezierCurveTo(15,-7,16,3,13,8);
  ctx.bezierCurveTo(2,13,-12,11,-17,5);
  ctx.fill();
  ctx.fillStyle=def.color;
  ctx.beginPath();
  ctx.moveTo(-15,3); ctx.bezierCurveTo(-17,-7,-7,-13,5,-10);
  ctx.bezierCurveTo(15,-7,15,2,12,7);
  ctx.bezierCurveTo(1,12,-11,10,-15,3);
  ctx.fill();
  // Barriga clara
  ctx.fillStyle='#FFF8E1';
  ctx.beginPath();
  ctx.moveTo(-8,5); ctx.bezierCurveTo(-6,0,2,-3,8,-1);
  ctx.bezierCurveTo(11,1,9,7,5,8);
  ctx.bezierCurveTo(-1,10,-7,9,-8,5);
  ctx.fill();

  // ── Pescoço ───────────────────────────────────────────────────────────────
  ctx.fillStyle=def.color;
  ctx.beginPath();
  ctx.moveTo(9,-9); ctx.bezierCurveTo(11,-20,20,-21,22,-13);
  ctx.bezierCurveTo(22,-5,16,-4,12,-5);
  ctx.fill();

  // ── Cabeça ────────────────────────────────────────────────────────────────
  var hx=22, hy=-16;
  ctx.fillStyle=def.accent;
  ctx.beginPath(); ctx.arc(hx+1,hy+1,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=def.color;
  ctx.beginPath(); ctx.arc(hx,hy,12,0,Math.PI*2); ctx.fill();

  // ── Orelhas pontudas ──────────────────────────────────────────────────────
  // Orelha traseira
  ctx.fillStyle=def.accent;
  ctx.beginPath();
  ctx.moveTo(hx-6,hy-10); ctx.lineTo(hx-14,hy-24); ctx.lineTo(hx-1,hy-12);
  ctx.fill();
  ctx.fillStyle='#FFCCBC';
  ctx.beginPath();
  ctx.moveTo(hx-6,hy-11); ctx.lineTo(hx-12,hy-22); ctx.lineTo(hx-2,hy-13);
  ctx.fill();
  // Orelha dianteira
  ctx.fillStyle=def.color;
  ctx.beginPath();
  ctx.moveTo(hx+3,hy-10); ctx.lineTo(hx+10,hy-23); ctx.lineTo(hx+14,hy-11);
  ctx.fill();
  ctx.fillStyle='#FFCCBC';
  ctx.beginPath();
  ctx.moveTo(hx+4,hy-11); ctx.lineTo(hx+10,hy-20); ctx.lineTo(hx+13,hy-12);
  ctx.fill();

  // ── Focinho ───────────────────────────────────────────────────────────────
  ctx.fillStyle='#FFF8E1';
  ctx.beginPath();
  ctx.moveTo(hx+4,hy+2);
  ctx.bezierCurveTo(hx+10,hy,hx+15,hy+4,hx+13,hy+9);
  ctx.bezierCurveTo(hx+9,hy+13,hx+3,hy+11,hx+3,hy+6);
  ctx.bezierCurveTo(hx+3,hy+3,hx+4,hy+2,hx+4,hy+2);
  ctx.fill();

  // Narizinho triangular
  ctx.fillStyle='#E91E63';
  ctx.beginPath();
  ctx.moveTo(hx+9,hy+4); ctx.lineTo(hx+12,hy+7); ctx.lineTo(hx+6,hy+7);
  ctx.fill();
  // Boca
  ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(hx+9,hy+7); ctx.quadraticCurveTo(hx+7,hy+11,hx+5,hy+10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx+9,hy+7); ctx.quadraticCurveTo(hx+11,hy+11,hx+13,hy+10); ctx.stroke();

  // ── Bigodes ───────────────────────────────────────────────────────────────
  ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(hx+3,hy+5); ctx.lineTo(hx-6,hy+3);  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx+3,hy+7); ctx.lineTo(hx-6,hy+7);  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx+13,hy+5); ctx.lineTo(hx+20,hy+3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx+13,hy+7); ctx.lineTo(hx+20,hy+7); ctx.stroke();

  // ── Olho (amendoado felino) ────────────────────────────────────────────────
  ctx.fillStyle='white';
  ctx.beginPath();
  ctx.moveTo(hx+2,hy-8); ctx.bezierCurveTo(hx+5,hy-12,hx+10,hy-12,hx+11,hy-8);
  ctx.bezierCurveTo(hx+10,hy-4,hx+5,hy-4,hx+2,hy-8);
  ctx.fill();
  ctx.fillStyle='#33691E'; // Verde gatuno
  ctx.beginPath();
  ctx.moveTo(hx+3,hy-8); ctx.bezierCurveTo(hx+5,hy-11,hx+9,hy-11,hx+10,hy-8);
  ctx.bezierCurveTo(hx+9,hy-5,hx+5,hy-5,hx+3,hy-8);
  ctx.fill();
  // Pupila vertical
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(hx+6.5,hy-8,1.5,3.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(hx+7,hy-9.5,1,0,Math.PI*2); ctx.fill();

  // ── Sobrancelha ───────────────────────────────────────────────────────────
  ctx.strokeStyle=def.accent; ctx.lineWidth=1.8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(hx+2,hy-13); ctx.quadraticCurveTo(hx+6,hy-15,hx+11,hy-13); ctx.stroke();

  ctx.restore();
}

function drawDog(cx,cy,def){
  var t=Date.now()/110;
  var run=Math.sin(t)*6;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.scale(0.85,0.85); // Reduzido 15%

  // ── Rabo (balança feliz) ──────────────────────────────────────────────────
  var tw=Math.sin(t*2.2)*0.5;
  ctx.strokeStyle=def.color; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-17,-2);
  ctx.quadraticCurveTo(-30+tw*4,-12+tw*8,-26+tw*3,-24+tw*10);
  ctx.stroke();
  ctx.strokeStyle=def.accent; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(-17,-2);
  ctx.quadraticCurveTo(-30+tw*4,-12+tw*8,-26+tw*3,-24+tw*10);
  ctx.stroke();

  // ── Patas traseiras ───────────────────────────────────────────────────────
  // Pata traseira fundo
  ctx.strokeStyle=def.accent; ctx.lineWidth=4.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-12,4); ctx.lineTo(-16,14+run); ctx.lineTo(-19,22+run*0.3); ctx.stroke();
  ctx.fillStyle=def.accent;
  ctx.beginPath(); ctx.ellipse(-20,22+run*0.3,5,2.5,0.2,0,Math.PI*2); ctx.fill();
  // Pata traseira frente
  ctx.strokeStyle='#A1887F'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(-7,5); ctx.lineTo(-9,15-run); ctx.lineTo(-11,22-run*0.3); ctx.stroke();
  ctx.fillStyle='#A1887F';
  ctx.beginPath(); ctx.ellipse(-12,22-run*0.3,5,2.5,0.2,0,Math.PI*2); ctx.fill();

  // ── Patas dianteiras ──────────────────────────────────────────────────────
  // Pata dianteira fundo
  ctx.strokeStyle=def.accent; ctx.lineWidth=4.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(9,4); ctx.lineTo(11,14-run); ctx.lineTo(13,22-run*0.3); ctx.stroke();
  ctx.fillStyle=def.accent;
  ctx.beginPath(); ctx.ellipse(14,22-run*0.3,5,2.5,-0.2,0,Math.PI*2); ctx.fill();
  // Pata dianteira frente
  ctx.strokeStyle='#A1887F'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(13,4); ctx.lineTo(17,14+run); ctx.lineTo(20,22+run*0.3); ctx.stroke();
  ctx.fillStyle='#A1887F';
  ctx.beginPath(); ctx.ellipse(21,22+run*0.3,5,2.5,-0.2,0,Math.PI*2); ctx.fill();

  // ── Corpo ─────────────────────────────────────────────────────────────────
  // Sombra/profundidade
  ctx.fillStyle=def.accent;
  ctx.beginPath();
  ctx.moveTo(-18,6); ctx.bezierCurveTo(-20,-4,-10,-14,6,-10);
  ctx.bezierCurveTo(16,-7,18,4,15,9);
  ctx.bezierCurveTo(2,14,-12,12,-18,6);
  ctx.fill();
  // Corpo principal
  ctx.fillStyle=def.color;
  ctx.beginPath();
  ctx.moveTo(-16,4); ctx.bezierCurveTo(-18,-6,-8,-14,6,-10);
  ctx.bezierCurveTo(16,-7,17,3,14,8);
  ctx.bezierCurveTo(2,13,-12,11,-16,4);
  ctx.fill();
  // Barriga mais clara
  ctx.fillStyle='#D7CCC8';
  ctx.beginPath();
  ctx.moveTo(-10,6); ctx.bezierCurveTo(-8,1,0,-2,8,0);
  ctx.bezierCurveTo(12,2,10,8,6,9);
  ctx.bezierCurveTo(0,11,-8,10,-10,6);
  ctx.fill();

  // ── Pescoço ───────────────────────────────────────────────────────────────
  ctx.fillStyle=def.color;
  ctx.beginPath();
  ctx.moveTo(10,-9); ctx.bezierCurveTo(12,-20,22,-22,24,-14);
  ctx.bezierCurveTo(24,-6,18,-4,13,-5);
  ctx.fill();
  ctx.strokeStyle=def.accent; ctx.lineWidth=0.8;
  ctx.beginPath();
  ctx.moveTo(10,-9); ctx.bezierCurveTo(12,-20,22,-22,24,-14);
  ctx.bezierCurveTo(24,-6,18,-4,13,-5);
  ctx.stroke();

  // ── Cabeça ────────────────────────────────────────────────────────────────
  var hx=24, hy=-17;
  // Sombra cabeça
  ctx.fillStyle=def.accent;
  ctx.beginPath(); ctx.arc(hx+1,hy+1,12,0,Math.PI*2); ctx.fill();
  // Cabeça
  ctx.fillStyle=def.color;
  ctx.beginPath(); ctx.arc(hx,hy,12,0,Math.PI*2); ctx.fill();

  // ── Orelha (floppy, caindo) ───────────────────────────────────────────────
  ctx.fillStyle=def.accent;
  ctx.beginPath();
  ctx.moveTo(hx-5,hy-10);
  ctx.bezierCurveTo(hx-14,hy-10,hx-18,hy+2,hx-16,hy+12);
  ctx.bezierCurveTo(hx-14,hy+20,hx-7,hy+20,hx-5,hy+13);
  ctx.bezierCurveTo(hx-4,hy+6,hx-4,hy-2,hx-5,hy-10);
  ctx.fill();
  // Interior orelha
  ctx.fillStyle='#A1887F';
  ctx.beginPath();
  ctx.moveTo(hx-6,hy-6);
  ctx.bezierCurveTo(hx-11,hy-5,hx-13,hy+4,hx-12,hy+10);
  ctx.bezierCurveTo(hx-11,hy+15,hx-8,hy+15,hx-7,hy+10);
  ctx.bezierCurveTo(hx-6,hy+4,hx-6,hy-1,hx-6,hy-6);
  ctx.fill();

  // ── Focinho ───────────────────────────────────────────────────────────────
  ctx.fillStyle='#BCAAA4';
  ctx.beginPath();
  ctx.moveTo(hx+5,hy+1);
  ctx.bezierCurveTo(hx+12,hy-1,hx+16,hy+4,hx+14,hy+9);
  ctx.bezierCurveTo(hx+10,hy+14,hx+3,hy+12,hx+3,hy+7);
  ctx.bezierCurveTo(hx+3,hy+3,hx+5,hy+1,hx+5,hy+1);
  ctx.fill();
  ctx.strokeStyle='#8D6E63'; ctx.lineWidth=0.8;
  ctx.beginPath();
  ctx.moveTo(hx+5,hy+1);
  ctx.bezierCurveTo(hx+12,hy-1,hx+16,hy+4,hx+14,hy+9);
  ctx.bezierCurveTo(hx+10,hy+14,hx+3,hy+12,hx+3,hy+7);
  ctx.bezierCurveTo(hx+3,hy+3,hx+5,hy+1,hx+5,hy+1);
  ctx.stroke();

  // ── Nariz ─────────────────────────────────────────────────────────────────
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.arc(hx+14,hy+5,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(hx+13,hy+4,1.2,0,Math.PI*2); ctx.fill();
  // Narina
  ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(hx+12,hy+6); ctx.lineTo(hx+13,hy+7); ctx.stroke();

  // ── Linguinha (balança) ────────────────────────────────────────────────────
  var tongueWag=Math.sin(t*1.8)*3;
  ctx.fillStyle='#E91E63';
  ctx.beginPath();
  ctx.moveTo(hx+7,hy+11);
  ctx.bezierCurveTo(hx+5,hy+13,hx+4+tongueWag,hy+19,hx+7+tongueWag,hy+21);
  ctx.bezierCurveTo(hx+11+tongueWag,hy+23,hx+14+tongueWag,hy+20,hx+13,hy+16);
  ctx.bezierCurveTo(hx+12,hy+13,hx+9,hy+11,hx+7,hy+11);
  ctx.fill();
  ctx.strokeStyle='#C2185B'; ctx.lineWidth=0.8;
  ctx.beginPath();
  ctx.moveTo(hx+7,hy+11);
  ctx.bezierCurveTo(hx+5,hy+13,hx+4+tongueWag,hy+19,hx+7+tongueWag,hy+21);
  ctx.bezierCurveTo(hx+11+tongueWag,hy+23,hx+14+tongueWag,hy+20,hx+13,hy+16);
  ctx.stroke();
  // Divisão da língua
  ctx.strokeStyle='#C2185B'; ctx.lineWidth=0.8;
  ctx.beginPath();
  ctx.moveTo(hx+10,hy+13); ctx.lineTo(hx+10+tongueWag*0.5,hy+20);
  ctx.stroke();

  // ── Olho ──────────────────────────────────────────────────────────────────
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(hx+4,hy-7,4.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#5D4037';
  ctx.beginPath(); ctx.arc(hx+5,hy-7,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(hx+5.5,hy-7,1.8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(hx+6,hy-8,1,0,Math.PI*2); ctx.fill();

  // ── Sobrancelha expressiva ────────────────────────────────────────────────
  ctx.strokeStyle=def.accent; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(hx+1,hy-12); ctx.quadraticCurveTo(hx+5,hy-14,hx+9,hy-12);
  ctx.stroke();

  // ── Coleira ───────────────────────────────────────────────────────────────
  ctx.strokeStyle='#E53935'; ctx.lineWidth=4; ctx.lineCap='butt';
  ctx.beginPath();
  ctx.arc(hx,hy,12,0.4,1.2);
  ctx.stroke();
  ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.arc(hx+9,hy+9,2.5,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawDuck(cx,cy,def){
  // Wing flap animation when duck tries to jump outside water
  var wingAngle=0;
  if(duckFlapTimer>0){
    wingAngle=Math.sin((30-duckFlapTimer)*0.8)*0.55; // flap angle
  }
  // Body
  ctx.fillStyle=def.color;
  ctx.beginPath(); ctx.ellipse(cx,cy+6,17,14,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy-6,11,0,Math.PI*2); ctx.fill();
  // Beak
  ctx.fillStyle=def.accent;
  ctx.beginPath(); ctx.moveTo(cx+8,cy-7); ctx.lineTo(cx+18,cy-5); ctx.lineTo(cx+8,cy-2); ctx.fill();
  // Animated wing
  ctx.save();
  ctx.translate(cx-6,cy+5);
  ctx.rotate(-wingAngle);
  ctx.fillStyle='#F9A825';
  ctx.beginPath(); ctx.ellipse(0,0,10,6,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // Eye
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(cx+4,cy-8,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(cx+5,cy-9,1.2,0,Math.PI*2); ctx.fill();
  // Show "no jump" hint bubble when flapping — raised higher to avoid name conflict
  if(duckFlapTimer>0 && !pl.inWaterPit){
    var bx=cx, by=cy-62; // raised up well above the name tag
    ctx.fillStyle='rgba(255,255,255,0.95)';
    rrect(bx-32,by-14,64,22,10); ctx.fill();
    ctx.strokeStyle='#FDD835'; ctx.lineWidth=2;
    rrect(bx-32,by-14,64,22,10); ctx.stroke();
    ctx.fillStyle='#E65100'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
    ctx.fillText('so nado! :)',bx,by+3);
    // Tail pointing down toward duck
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.beginPath();
    ctx.moveTo(bx-5,by+8); ctx.lineTo(bx+5,by+8); ctx.lineTo(bx,by+16);
    ctx.fill();
    ctx.strokeStyle='#FDD835'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(bx-5,by+8); ctx.lineTo(bx,by+16); ctx.lineTo(bx+5,by+8);
    ctx.stroke();
  }
}

function drawTatu(cx,cy,def){
  var t=Date.now()/180;
  var skinColor='#D4A574';   // bege dourado suave
  var shellColor='#A0785A';  // marrom médio carapaça
  var bandLight='#C49A6C';   // faixa clara
  var tummyColor='#F0D0A0';  // barriga bege clarinho
  var darkColor='#6B4226';   // contorno suave

  // ── RABO FOFO anelado (curvo para cima) ──────────────────────
  // Rabo afinando gradualmente da base até a ponta
  var tailSteps=14;
  var tSx=cx-12,tSy=cy+3,tCx=cx-26,tCy=cy+2,tEx=cx-24,tEy=cy-8;
  for(var ts=0;ts<tailSteps;ts++){
    var t0=ts/tailSteps, t1=(ts+1)/tailSteps;
    var lw=4.5*(1-t0)+0.3*t0;
    var bx0=(1-t0)*(1-t0)*tSx+2*(1-t0)*t0*tCx+t0*t0*tEx;
    var by0=(1-t0)*(1-t0)*tSy+2*(1-t0)*t0*tCy+t0*t0*tEy;
    var bx1=(1-t1)*(1-t1)*tSx+2*(1-t1)*t1*tCx+t1*t1*tEx;
    var by1=(1-t1)*(1-t1)*tSy+2*(1-t1)*t1*tCy+t1*t1*tEy;
    ctx.strokeStyle=bandLight; ctx.lineWidth=lw; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(bx0,by0); ctx.lineTo(bx1,by1); ctx.stroke();
  }
  // Contorno sutil
  ctx.strokeStyle=darkColor; ctx.lineWidth=0.7; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(cx-12,cy+3);
  ctx.quadraticCurveTo(cx-26,cy+2,cx-24,cy-8);
  ctx.stroke();
  // Anéis do rabo
  var raboPoints=[{x:cx-15,y:cy+2},{x:cx-19,y:cy},{x:cx-22,y:cy-4},{x:cx-23,y:cy-7}];
  for(var r=0;r<raboPoints.length;r++){
    ctx.strokeStyle=darkColor; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.arc(raboPoints[r].x,raboPoints[r].y,1.5-r*0.3,0,Math.PI*2); ctx.stroke();
  }

  // ── BARRIGA clara e fofa ──────────────────────────────────────
  ctx.fillStyle=tummyColor;
  ctx.beginPath(); ctx.ellipse(cx-1,cy+5,11,7,0,0,Math.PI*2); ctx.fill();

  // ── CORPO com carapaça em faixas ─────────────────────────────
  // Placa traseira arredondada
  var shGrad=ctx.createRadialGradient(cx-10,cy-4,1,cx-8,cy-1,11);
  shGrad.addColorStop(0,bandLight); shGrad.addColorStop(1,shellColor);
  ctx.fillStyle=shGrad;
  ctx.beginPath(); ctx.ellipse(cx-8,cy-1,11,10,0.2,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=darkColor; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.ellipse(cx-8,cy-1,11,10,0.2,0,Math.PI*2); ctx.stroke();

  // 3 faixas centrais animadas
  for(var b=0;b<3;b++){
    var bx=cx-1+b*5;
    var wob=isDigging?Math.sin(t*5+b*1.2)*2:0;
    var fg=ctx.createLinearGradient(bx-4,cy-9,bx+4,cy+7);
    fg.addColorStop(0,bandLight); fg.addColorStop(1,shellColor);
    ctx.fillStyle=fg;
    ctx.beginPath(); ctx.ellipse(bx,cy-1+wob,4,9,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=darkColor; ctx.lineWidth=0.6;
    ctx.beginPath(); ctx.ellipse(bx,cy-1+wob,4,9,0,0,Math.PI*2); ctx.stroke();
  }

  // Placa dianteira (ombro)
  var shGrad2=ctx.createRadialGradient(cx+10,cy-3,1,cx+10,cy,8);
  shGrad2.addColorStop(0,bandLight); shGrad2.addColorStop(1,shellColor);
  ctx.fillStyle=shGrad2;
  ctx.beginPath(); ctx.ellipse(cx+10,cy-1,8,9,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=darkColor; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.ellipse(cx+10,cy-1,8,9,0,0,Math.PI*2); ctx.stroke();

  // ── PATINHAS com garrinhas ────────────────────────────────────
  var patas=[{x:cx-9,fase:0},{x:cx-1,fase:1},{x:cx+5,fase:2},{x:cx+12,fase:3}];
  for(var p=0;p<4;p++){
    var pa=patas[p];
    var wobP=isDigging?Math.sin(t*5+pa.fase*1.1)*5:Math.sin(t*0.9+pa.fase)*1.5;
    ctx.strokeStyle=skinColor; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(pa.x,cy+9); ctx.lineTo(pa.x,cy+11+wobP); ctx.stroke();
    ctx.fillStyle=skinColor;
    ctx.beginPath(); ctx.ellipse(pa.x,cy+12+wobP,2,1.25,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=darkColor; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.ellipse(pa.x,cy+12+wobP,2,1.25,0,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle=darkColor; ctx.lineWidth=1.5; ctx.lineCap='round';
    for(var g=-1;g<=1;g++){
      ctx.beginPath();
      ctx.moveTo(pa.x+g*1.5,cy+13+wobP);
      ctx.quadraticCurveTo(pa.x+g*2,cy+15+wobP+(isDigging?2:0),
                           pa.x+g*1.5,cy+16+wobP+(isDigging?3:0));
      ctx.stroke();
    }
  }

  // ── CABEÇA proporcional ao corpo ─────────────────────────────
  ctx.fillStyle=skinColor;
  ctx.beginPath(); ctx.ellipse(cx+20,cy-1,7,6,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=darkColor; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.ellipse(cx+20,cy-1,7,6,0,0,Math.PI*2); ctx.stroke();

  // Orelhinhas proporcionais
  ctx.fillStyle=shellColor;
  ctx.beginPath(); ctx.ellipse(cx+15,cy-6,2.63,4.2,0.3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=darkColor; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.ellipse(cx+15,cy-6,2.63,4.2,0.3,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#E8B99A';
  ctx.beginPath(); ctx.ellipse(cx+15,cy-6,1.37,2.63,0.3,0,Math.PI*2); ctx.fill();

  ctx.fillStyle=shellColor;
  ctx.beginPath(); ctx.ellipse(cx+22,cy-7,2.63,4.2,-0.3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=darkColor; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.ellipse(cx+22,cy-7,2.63,4.2,-0.3,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#E8B99A';
  ctx.beginPath(); ctx.ellipse(cx+22,cy-7,1.37,2.63,-0.3,0,Math.PI*2); ctx.fill();

  // Focinho pontudo e proporcional
  ctx.fillStyle=tummyColor;
  ctx.beginPath(); ctx.ellipse(cx+26,cy+1,4.66,2.92,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=darkColor; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.ellipse(cx+26,cy+1,4.66,2.92,0,0,Math.PI*2); ctx.stroke();

function drawCaterpillar(cx,cy,def){
  var t=Date.now()/200; // Animação suave do corpo
  
  // Corpo virado para DIREITA
  var numSegments=6;
  var segmentRadius=6; // AUMENTADO 2x
  var spacing=6; // AUMENTADO 2x
  
  // Desenha os segmentos do corpo com ondulação
  for(var s=0;s<numSegments;s++){
    var sx=cx+(s)*spacing; // para DIREITA
    var wave=Math.sin(t+s*0.4)*2.5; // ondulação aumentada proporcionalmente
    var sy=cy+2+wave; // posição Y aumentada
    
    ctx.fillStyle=def.color;
    ctx.beginPath(); ctx.arc(sx,sy,segmentRadius,0,Math.PI*2); ctx.fill();
    // Contorno
    ctx.strokeStyle='#7CB342'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(sx,sy,segmentRadius,0,Math.PI*2); ctx.stroke();
    // Franja
    ctx.strokeStyle='#558B2F'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(sx-segmentRadius,sy); ctx.lineTo(sx+segmentRadius,sy); ctx.stroke();
    
    // PERNINHAS (4 por segmento, tocando no chão)
    if(s<numSegments){
      var legCount=4;
      var legSpacing=segmentRadius*2/legCount;
      for(var l=0;l<legCount;l++){
        var lx=sx-segmentRadius+l*legSpacing+1;
        var legWave=Math.sin(t+s*0.4+l*0.3)*1;
        var lyTop=sy+segmentRadius+1+legWave; // acompanha a ondulação do corpo
        var lyBottom=cy+19; // reduzido para metade novamente (cerca de 10px)
        
        ctx.strokeStyle='#558B2F'; ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.moveTo(lx,lyTop); ctx.lineTo(lx,lyBottom); ctx.stroke();
        
        // Pé pequeno na ponta
        ctx.fillStyle='#558B2F';
        ctx.beginPath(); ctx.arc(lx,lyBottom,1.2,0,Math.PI*2); ctx.fill();
      }
    }
  }
  
  // Cabeça (direita)
  var headX=cx+(numSegments)*spacing;
  ctx.fillStyle=def.color;
  ctx.beginPath(); ctx.arc(headX,cy-8,9,0,Math.PI*2); ctx.fill(); // AUMENTADO 2x
  ctx.strokeStyle='#7CB342'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(headX,cy-8,9,0,Math.PI*2); ctx.stroke();
  
  // Antenas (aumentadas)
  ctx.strokeStyle=def.accent; ctx.lineWidth=1.8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(headX-4,cy-14); ctx.quadraticCurveTo(headX-7,cy-18,headX-5,cy-22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(headX+4,cy-14); ctx.quadraticCurveTo(headX+7,cy-18,headX+5,cy-22); ctx.stroke();
  
  // Olhos
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(headX-4,cy-10,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(headX+4,cy-10,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(headX-3,cy-11,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(headX+5,cy-11,1.2,0,Math.PI*2); ctx.fill();
  
  // Boca
  ctx.strokeStyle='#111'; ctx.lineWidth=1.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(headX,cy-5,3,0,Math.PI); ctx.stroke();
}

function drawFrogGaps(){
  var lv=getLevel(); if(!lv.frogGaps) return;
  for(var i=0;i<lv.frogGaps.length;i++){
    var g=lv.frogGaps[i], sx=g.x-camX;
    if(sx>CW||sx+g.w<0) continue;
    ctx.fillStyle='#070B14'; ctx.fillRect(sx,GY,g.w,CH-GY);
    var rg=ctx.createLinearGradient(0,g.ceilY,0,g.ceilY+g.ceilH);
    rg.addColorStop(0,'#1A2744'); rg.addColorStop(1,'#2E3F6B');
    ctx.fillStyle=rg; ctx.fillRect(sx,g.ceilY,g.w,g.ceilH);
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
    for(var rx=sx;rx<sx+g.w;rx+=16){ ctx.beginPath(); ctx.moveTo(rx,g.ceilY); ctx.lineTo(rx+8,g.ceilY+g.ceilH); ctx.stroke(); }
    ctx.fillStyle='#1A2744';
    for(var st=sx+12;st<sx+g.w-8;st+=30){
      var sh=10+Math.sin(st)*4;
      ctx.beginPath(); ctx.moveTo(st-5,g.ceilY+g.ceilH); ctx.lineTo(st+5,g.ceilY+g.ceilH); ctx.lineTo(st,g.ceilY+g.ceilH+sh); ctx.fill();
    }
    ctx.fillStyle='rgba(0,0,0,0.6)'; rrect(sx+g.w/2-85,g.ceilY-30,170,24,10); ctx.fill();
    ctx.strokeStyle='#4CAF50'; ctx.lineWidth=1.5; rrect(sx+g.w/2-85,g.ceilY-30,170,24,10); ctx.stroke();
    ctx.fillStyle='#4CAF50'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
    ctx.fillText('So o Sapinho salta! [6]',sx+g.w/2,g.ceilY-14);
  }
}
function drawInsects(){
  if(phase!==3 && phase!==4 && phase!==5) return; // INCLUIR FASE 5
  var t=Date.now()/120;
  if(phase===3){
    for(var i=0;i<p3Insects.length;i++){
      var ins=p3Insects[i]; if(ins.eaten) continue;
      var sx=ins.x-camX; if(sx>CW+60||sx<-60) continue;
      if(ins.type==='barata'){
        ctx.fillStyle='#4E342E'; ctx.beginPath(); ctx.ellipse(sx+12,ins.y+8,10,6,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#6D4C41'; ctx.beginPath(); ctx.ellipse(sx+12,ins.y+6,5,4,0,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#222'; ctx.lineWidth=1;
        for(var lg=-1;lg<=1;lg+=2){
          ctx.beginPath(); ctx.moveTo(sx+12,ins.y+8); ctx.lineTo(sx+12+lg*14,ins.y+8+Math.sin(t+lg)*3); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(sx+12,ins.y+7); ctx.lineTo(sx+12+lg*12,ins.y+4); ctx.stroke();
        }
      } else {
        for(var seg=0;seg<5;seg++){
          var bx=sx+seg*9+4, by=ins.y+9+Math.sin(t+seg*0.7)*2;
          ctx.fillStyle=seg%2===0?'#D84315':'#BF360C';
          ctx.beginPath(); ctx.arc(bx,by,5,0,Math.PI*2); ctx.fill();
          ctx.strokeStyle='#444'; ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx-5,by+4+Math.sin(t+seg)*2); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx-5,by-4+Math.sin(t+seg)*2); ctx.stroke();
        }
      }
      var pulse=0.6+0.4*Math.sin(t*3); ctx.globalAlpha=pulse;
      ctx.fillStyle='#F44336'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
      ctx.fillText('!',sx+ins.w/2,ins.y-6); ctx.globalAlpha=1;
    }
  } else if(phase===4){ // INSETOS VOADORES DA FASE 4
    for(var fi=0;fi<p4FlyingInsects.length;fi++){
      var fins=p4FlyingInsects[fi]; if(fins.eaten) continue;
      var sx=fins.x-camX; if(sx>CW+60||sx<-60) continue;
      if(fins.type==='borboleta'){
        // Borboleta colorida

        ctx.fillStyle='#4ECDC4'; ctx.beginPath(); ctx.ellipse(sx+10,fins.y+8,8,6,-0.3,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#FFE66D'; ctx.beginPath(); ctx.arc(sx+10,fins.y+8,3,0,Math.PI*2); ctx.fill();
      } else {
        // Libélula azul
        ctx.fillStyle='#74B9FF'; ctx.beginPath(); ctx.ellipse(sx+9,fins.y+7,7,5,0,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#0984E3'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(sx+2,fins.y+7); ctx.lineTo(sx+16,fins.y+7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(sx+9,fins.y+2); ctx.lineTo(sx+9,fins.y+12); ctx.stroke();
      }
      var pulse=0.5+0.5*Math.sin(t*4+fi); ctx.globalAlpha=pulse;
      ctx.fillStyle='#FFD700'; ctx.font='bold 9px Arial'; ctx.textAlign='center';
      ctx.fillText('🐸',sx+fins.w/2,fins.y-4); ctx.globalAlpha=1; // Emoji sapinho indicando que só ele pega
    }
  } else if(phase===5){ // INSETOS DA FASE 5
    for(var ii=0;ii<p5Insects.length;ii++){
      var inst=p5Insects[ii]; if(inst.eaten) continue;

        ctx.beginPath(); ctx.ellipse(sx+10,inst.y+10,5,4,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(sx+10,inst.y+16,6,5,0,0,Math.PI*2); ctx.fill();

        for(var lg=-1;lg<=1;lg+=2){
          ctx.beginPath(); ctx.moveTo(sx+10,inst.y+10); ctx.lineTo(sx+10+lg*8,inst.y+14); ctx.stroke();
        }
      } else if(inst.type==='joaninha'){
        // Joaninha com pontos
        ctx.fillStyle='#D32F2F'; ctx.beginPath(); ctx.arc(sx+10,inst.y+8,7,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#1B5E20'; ctx.beginPath(); ctx.arc(sx+10,inst.y+8,4,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#000';
        ctx.beginPath(); ctx.arc(sx+7,inst.y+5,1.5,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx+13,inst.y+5,1.5,0,Math.PI*2); ctx.fill();

      } else if(inst.type==='mosca'){

        ctx.fillStyle='#7CB342'; ctx.beginPath(); ctx.ellipse(sx+10,inst.y+9,6,5,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#558B2F'; ctx.beginPath(); ctx.arc(sx+10,inst.y+6,3,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#33691E'; ctx.lineWidth=1;
        for(var w=-1;w<=1;w+=2){
          ctx.beginPath(); ctx.moveTo(sx+10,inst.y+9); ctx.lineTo(sx+10+w*9,inst.y+6); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(sx+10,inst.y+9); ctx.lineTo(sx+10+w*8,inst.y+12); ctx.stroke();
        }
      } else if(inst.type==='araninha'){

        ctx.strokeStyle='#3E2723'; ctx.lineWidth=1;
        for(var leg=0;leg<8;leg++){
          var lx=sx+10+Math.cos(leg*Math.PI/4)*6;

          ctx.beginPath(); ctx.moveTo(sx+10,inst.y+7); ctx.lineTo(lx,ly); ctx.stroke();
        }
      } else if(inst.type==='pulgao'){
        // Pulgão pequeno verde
        ctx.fillStyle='#9CCC65'; ctx.beginPath(); ctx.arc(sx+10,inst.y+8,3,0,Math.PI*2); ctx.fill();

function drawWebs(){ // NOVA FUNÇÃO: TEIAS DE ARANHA DA FASE 4
  if(phase!==4) return;
  for(var i=0;i<p4Webs.length;i++){
    var web=p4Webs[i], sx=web.x-camX;
    if(sx>CW||sx+web.w<0) continue;
    // Teia circular com fios
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(sx+web.w/2,web.y+web.h/2,web.w/2,0,Math.PI*2); ctx.stroke();
    for(var r=1;r<4;r++){
      ctx.beginPath(); ctx.arc(sx+web.w/2,web.y+web.h/2,web.w/2*r/4,0,Math.PI*2); ctx.stroke();
    }
    // Fios radiais
    for(var a=0;a<8;a++){
      var ang=a*Math.PI/4;
      ctx.beginPath();
      ctx.moveTo(sx+web.w/2,web.y+web.h/2);
      ctx.lineTo(sx+web.w/2+Math.cos(ang)*web.w/2,web.y+web.h/2+Math.sin(ang)*web.h/2);
      ctx.stroke();
    }
    // Aranha pequena
    ctx.fillStyle='#2D3436'; ctx.beginPath(); ctx.arc(sx+web.w/2+5,web.y+web.h/2+5,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.7)'; rrect(sx+web.w/2-35,web.y-25,70,20,8); ctx.fill();
    ctx.strokeStyle='#FFD700'; ctx.lineWidth=1.5; rrect(sx+web.w/2-35,web.y-25,70,20,8); ctx.stroke();
    ctx.fillStyle='#FFD700'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
    ctx.fillText('Teia Pegajosa!',sx+web.w/2,web.y-10);
  }
}

// ── Game Loop ─────────────────────────────────────────────────────────────────
function loop(){
  ctx.clearRect(0,0,CW,CH);
  if(state==='menu') drawMenu();
  else if(state==='playing'){
    update();
    drawBG(); drawGround(); drawPlatforms(); drawWalls();
    drawMegaBarriers(); drawWaterPits(); drawGaps(); drawFrogGaps();
    drawSpeedGates(); drawStars(); drawInsects(); drawWebs(); drawFinish();
    drawDigTunnel(); drawP3UnlockStars(); drawP6Leaves(); drawPlayer(); drawParticles(); drawMetamorph(); drawHUD();
  }
  else if(state==='phase2intro'){ drawBG(); drawGround(); drawPhase2Intro(); }
  else if(state==='phase3intro'){ drawBG(); drawGround(); drawPhase3Intro(); }
  else if(state==='phase4intro'){ drawBG(); drawGround(); drawPhase4Intro(); } // ADICIONADO
  else if(state==='phase5intro'){ drawBG(); drawGround(); drawPhase5Intro(); }
  else if(state==='phase6intro'){ drawBG(); drawGround(); drawPhase6Intro(); }
  else if(state==='win')        { drawBG(); drawGround(); drawWin(); }
  else if(state==='gameover')   { drawBG(); drawGround(); drawGameOver(); }
  requestAnimationFrame(loop);
}
loop();

// ── TOUCH CONTROLS ─────────────────────────────────────────────────────────
function touchStart(key){
  K[key] = true;
  var btnMap = {'ArrowLeft':'tbtn-left','ArrowRight':'tbtn-right','ArrowUp':'tbtn-up','ArrowDown':'tbtn-down'};
  var el = document.getElementById(btnMap[key]);
  if(el) el.classList.add('pressed');
  // Simula keydown para ações únicas (pulo, cavar, avançar de fase, iniciar jogo)
  var ev = new KeyboardEvent('keydown', {key: key, bubbles: true});
  document.dispatchEvent(ev);
}
function touchEnd(key){
  K[key] = false;
  var btnMap = {'ArrowLeft':'tbtn-left','ArrowRight':'tbtn-right','ArrowUp':'tbtn-up','ArrowDown':'tbtn-down'};
  var el = document.getElementById(btnMap[key]);
  if(el) el.classList.remove('pressed');
  var ev = new KeyboardEvent('keyup', {key: key, bubbles: true});
  document.dispatchEvent(ev);
}

// ══════════════════════════════════════════════════════════════
// RESPONSIVIDADE: CANVAS FULLSCREEN (D-PAD SOBREPOSTO)
// ══════════════════════════════════════════════════════════════
(function(){
  var GW = 800, GH = 440; // só o canvas — botões ocultos no mobile

  function applyScale(){
    var wrapper = document.getElementById('gameWrapper');
    var overlay = document.getElementById('rotateOverlay');
    var tpad    = document.getElementById('touchControls');
    var ui      = document.getElementById('ui');
    var mute    = document.getElementById('muteBtn');
    if(!wrapper) return;

    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var isTouch  = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    var isMobile = isTouch || vw <= 900;
    var isPortrait = vh > vw;

    // ── Desktop: tudo original ────────────────────────────────
    if(!isMobile){
      wrapper.style.cssText    = '';
      if(overlay) overlay.style.display = 'none';
      if(tpad)    tpad.style.display    = 'none';
      if(ui)      ui.style.display      = '';
      if(mute)  { mute.style.top = ''; mute.style.right = ''; }
      return;
    }

    // ── Mobile Portrait: overlay "gire o celular" ─────────────
    if(isPortrait){
      if(overlay) overlay.style.display = 'flex';
      wrapper.style.visibility = 'hidden';
      if(tpad) tpad.style.display = 'none';
      return;
    }

    // ── Mobile Landscape: canvas fullscreen ───────────────────
    if(overlay) overlay.style.display = 'none';
    wrapper.style.visibility = 'visible';

    // Oculta botões de personagem — D-pad substitui no mobile
    if(ui) ui.style.display = 'none';

    // Tenta travar landscape no Android Chrome
    try{
      if(screen.orientation && screen.orientation.lock)
        screen.orientation.lock('landscape').catch(function(){});
    }catch(e){}

    // Escala por LARGURA: preenche 100% da tela sem barras laterais
    // O canvas pode ultrapassar levemente a altura (overflow hidden oculta)
    var scale = vw / GW;
    var scaledW = GW * scale; // = vw (100% da largura)
    var scaledH = GH * scale;
    var offX = 0; // sem margem lateral
    // Centraliza verticalmente; se canvas for maior que vh, alinha no topo
    var groundScreenY = GY * scale;
    var desiredGroundY = vh - 55;
    var offY = scaledH <= vh
        ? Math.round((vh - scaledH) / 2)
        : Math.round(desiredGroundY - groundScreenY);

    wrapper.style.position       = 'fixed';
    wrapper.style.top            = '0';
    wrapper.style.left           = '0';
    wrapper.style.transformOrigin = 'top left';
    wrapper.style.transform      = 'translate('+offX+'px,'+offY+'px) scale('+scale+')';

    // Mostra D-pad
    if(tpad) tpad.style.display = 'flex';

    // Reposiciona botão mute no canto superior direito do canvas
    if(mute){
      mute.style.position = 'fixed';
      mute.style.top   = (offY + 8 + 50) + 'px';
      mute.style.right = (vw - offX - scaledW + 8) + 'px';
    }
  }

  // Mostra/oculta UI ao trocar estado (menu vs jogo)
  // Sobrescreve startGame para ocultar UI no mobile
  var _origStart = null;
  function patchStartGame(){
    if(typeof startGame !== 'undefined' && !_origStart){
      _origStart = startGame;
      startGame = function(){
        _origStart();
        var isTouch = ('ontouchstart' in window)||(navigator.maxTouchPoints>0);
        var ui = document.getElementById('ui');
        if(ui && (isTouch || window.innerWidth<=900)) ui.style.display='none';
      };
    }
  }

  
    // ── FULLSCREEN API ──────────────────────────────────────────────────────
    // Remove barra do navegador no mobile
    function requestFullscreen(){
      var doc = document.documentElement;
      if(doc.requestFullscreen) doc.requestFullscreen();
      else if(doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
      else if(doc.mozRequestFullScreen) doc.mozRequestFullScreen();
      else if(doc.msRequestFullscreen) doc.msRequestFullscreen();
    }

    // Chama fullscreen no primeiro toque (desbloqueia permissões)
    document.addEventListener('touchstart', function firstTouch(e){
      if(e.target.tagName !== 'BUTTON') requestFullscreen();
      document.removeEventListener('touchstart', firstTouch);
    }, {once: true});

    // Também no primeiro clique do mouse
    document.addEventListener('click', function firstClick(e){
      if(e.target.tagName !== 'BUTTON') requestFullscreen();
      document.removeEventListener('click', firstClick);
    }, {once: true});

window.addEventListener('resize', applyScale);
  window.addEventListener('orientationchange', function(){ setTimeout(applyScale,300); });

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', function(){
      applyScale(); setTimeout(applyScale,200);
      setTimeout(patchStartGame, 500);
    });
  } else {
    applyScale(); setTimeout(applyScale,200);
    setTimeout(patchStartGame, 500);
  }
})();

function toggleCharPanel(){
  var p = document.getElementById('charPanel');
  if(!p) return;
  if(p.style.display==='flex'){ p.style.display='none'; }
  else{ p.style.display='flex'; refreshLockState(); }
}

function showMobileUnlock(charName, emoji, panelId){
  var isTouch=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
  var isMob=isTouch||window.innerWidth<=900;
  var isPort=window.innerHeight>window.innerWidth;
  if(!isMob||isPort) return; // só no mobile landscape
  // Abre o charPanel
  var p=document.getElementById('charPanel');
  if(p){ p.style.display='flex'; refreshLockState(); }
  // Pulsa o botão desbloqueado
  var btn=document.getElementById(panelId);
  if(btn){ btn.classList.add('tbtn-unlocked'); }
  // Mostra toast
  var toast=document.getElementById('unlockToast');
  if(toast){
    toast.innerHTML='🔓 '+emoji+' '+charName+' desbloqueado!';
    toast.style.display='block';
  }
  // Remove após 3 segundos
  setTimeout(function(){
    if(btn) btn.classList.remove('tbtn-unlocked');
    if(toast) toast.style.display='none';
    if(p) p.style.display='none';
  }, 3000);
}

function refreshLockState(){
  // Desktop cards
  var btnTatu=document.getElementById('btn-tatu'), lockTatu=document.getElementById('cat-lock');
  if(btnTatu&&lockTatu){ if(catUnlocked){btnTatu.classList.remove('locked');lockTatu.style.display='none';}else{btnTatu.classList.add('locked');lockTatu.style.display='';} }
  var btnFrog=document.getElementById('btn-frog'), lockFrog=document.getElementById('frog-lock');
  if(btnFrog&&lockFrog){ if(frogUnlocked){btnFrog.classList.remove('locked');lockFrog.style.display='none';}else{btnFrog.classList.add('locked');lockFrog.style.display='';} }
  var btnCat=document.getElementById('btn-caterpillar'), lockCat=document.getElementById('caterpillar-lock');
  if(btnCat&&lockCat){ if(caterpillarUnlocked){btnCat.classList.remove('locked');lockCat.style.display='none';}else{btnCat.classList.add('locked');lockCat.style.display='';} }
  // Mobile charPanel
  var mlTatu=document.getElementById('mpanel-tatu-lock');
  if(mlTatu) mlTatu.style.display=catUnlocked?'none':'block';
  var mlFrog=document.getElementById('mpanel-frog-lock');
  if(mlFrog) mlFrog.style.display=frogUnlocked?'none':'block';
  var mlCat=document.getElementById('mpanel-caterpillar-lock');
  if(mlCat) mlCat.style.display=caterpillarUnlocked?'none':'block';
}
</script>
