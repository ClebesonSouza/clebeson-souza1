<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎹 Aventura das Patinhas — Fase 1</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: linear-gradient(135deg, #1a237e, #0D47A1, #1565C0);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 40px 50px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 0 60px rgba(255,215,0,0.15);
    }
    .titulo {
      font-size: 13px;
      color: #FFD700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .nome {
      font-size: 28px;
      font-weight: bold;
      color: white;
      margin-bottom: 4px;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
    }
    .fase {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 36px;
    }
    .visualizer {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      height: 60px;
      margin-bottom: 36px;
    }
    .bar {
      width: 8px;
      border-radius: 4px 4px 0 0;
      background: linear-gradient(to top, #FFD700, #FF8F00);
      transition: height 0.1s ease;
      height: 4px;
    }
    .controls {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-bottom: 28px;
    }
    .btn {
      border: none;
      border-radius: 50px;
      padding: 14px 32px;
      font-size: 16px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-play {
      background: linear-gradient(135deg, #43A047, #2E7D32);
      color: white;
      box-shadow: 0 4px 20px rgba(67,160,71,0.4);
    }
    .btn-play:hover { transform: scale(1.06); box-shadow: 0 6px 28px rgba(67,160,71,0.6); }
    .btn-stop {
      background: linear-gradient(135deg, #E53935, #B71C1C);
      color: white;
      box-shadow: 0 4px 20px rgba(229,57,53,0.4);
    }
    .btn-stop:hover { transform: scale(1.06); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
    .volume-row {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .volume-row label { font-size: 13px; color: rgba(255,255,255,0.6); }
    input[type=range] {
      -webkit-appearance: none;
      width: 160px; height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.2);
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #FFD700;
      cursor: pointer;
    }
    .status {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      min-height: 18px;
    }
    .nota {
      margin-top: 28px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      line-height: 1.6;
    }
    .playing-label {
      display: inline-block;
      background: rgba(67,160,71,0.25);
      border: 1px solid #43A047;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 11px;
      color: #A5D6A7;
      margin-bottom: 20px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .playing-label.visible { opacity: 1; }
  </style>
</head>
<body>
<div class="card">
  <div class="titulo">🎵 AnimalChoice — Música de Fase</div>
  <div class="nome">🎹 Aventura das Patinhas</div>
  <div class="fase">Fase 1 — Mundo Ensolarado</div>

  <div class="playing-label" id="playingLabel">▶ Tocando em loop...</div>

  <div class="visualizer" id="visualizer"></div>

  <div class="controls">
    <button class="btn btn-play" id="btnPlay" onclick="startMusic()">▶ Play</button>
    <button class="btn btn-stop" id="btnStop" onclick="stopMusic()" disabled>■ Stop</button>
  </div>
  <div style="margin-bottom:12px">
    <button class="btn" style="background:#555;color:#fff;padding:8px 20px;font-size:13px" onclick="testBeep()">🔔 Teste de Som</button>
  </div>

  <div class="volume-row">
    <label>🔉 Volume</label>
    <input type="range" id="volSlider" min="0" max="100" value="91" oninput="setVolume(this.value)"/>
    <label id="volVal">91%</label>
  </div>

  <div class="status" id="status">Clique em Play para ouvir</div>

  <div class="nota">
    🎹 Piano de cauda simulado via Web Audio API<br>
    16 compassos · Acordes + Melodia + Baixo + Arpejo · Loop contínuo
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════
// AVENTURA DAS PATINHAS — Fase 1 AnimalChoice
// Lookahead scheduler: agenda 300 ms de notas por vez (evita sobrecarga)
// Tonalidade : Dó Maior · 108 BPM · 16 compassos em loop
// ══════════════════════════════════════════════════════════════════════

var audioCtx      = null;
var masterGain    = null;
var reverbNode    = null;
var isPlaying     = false;
var loopTimeout   = null;
var vizInterval   = null;
var currentVolume = 0.91;

// ── Frequências das notas (Hz) ────────────────────────────────────────
var N = {
  C3:130.81, D3:146.83, E3:164.81, F3:174.61, G3:196.00, A3:220.00, B3:246.94,
  C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00, A4:440.00, B4:493.88,
  C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880.00, B5:987.77,
  C6:1046.50, D6:1174.66, E6:1318.51
};

// ── Tempo ─────────────────────────────────────────────────────────────
var BPM  = 108;
var BEAT = 60 / BPM;   // 0.5556s por beat
var BAR  = BEAT * 4;   // 2.222s  por compasso

// ══════════════════════════════════════════════════════════════════════
// ACORDES — progressão C · Am · F · G  (16 compassos = 4 repetições)
// ══════════════════════════════════════════════════════════════════════
var CHORDS = [
  [N.C3, N.G3, N.C4, N.E4],   // C Major
  [N.A3, N.E4, N.A4, N.C5],   // A Minor
  [N.F3, N.C4, N.F4, N.A4],   // F Major
  [N.G3, N.D4, N.G4, N.B4]    // G Major
];

// ══════════════════════════════════════════════════════════════════════
// ARPEJO — colcheias ascendentes por acorde (enriquece a textura)
// ══════════════════════════════════════════════════════════════════════
var ARPEGGIOS = [
  // C Major: C4 E4 G4 C5 E5 G5 C5 E5
  [N.C4,N.E4,N.G4,N.C5,N.E5,N.G5,N.C5,N.E5],
  // A Minor: A3 C4 E4 A4 C5 E5 A4 C5
  [N.A3,N.C4,N.E4,N.A4,N.C5,N.E5,N.A4,N.C5],
  // F Major: F3 A3 C4 F4 A4 C5 F4 A4
  [N.F3,N.A3,N.C4,N.F4,N.A4,N.C5,N.F4,N.A4],
  // G Major: G3 B3 D4 G4 B4 D5 G4 B4
  [N.G3,N.B3,N.D4,N.G4,N.B4,N.D5,N.G4,N.B4]
];

// ══════════════════════════════════════════════════════════════════════
// MELODIA — 16 compassos  [nota, duração_em_beats]
// Seção A (c.1–8): motivo principal e sua variação
// Seção B (c.9–16): desenvolvimento lírico e resolução final
// Todas as notas são consonantes com o acorde do compasso.
// ══════════════════════════════════════════════════════════════════════
var MELODY = [
  // ── SEÇÃO A ──────────────────────────────────────────────────────
  // c.1 — C  (motivo de abertura: salto de terça + movimento descendente)
  [N.E5,0.5],[N.G5,0.5],[N.C5,1.0],[N.E5,0.5],[N.D5,0.5],
  // c.2 — Am (resposta suave, descendente)
  [N.C5,1.0],[N.A4,0.5],[N.C5,0.5],[N.E5,1.0],
  // c.3 — F  (movimento de vizinhança com nota pedal)
  [N.F5,0.5],[N.E5,0.5],[N.D5,1.0],[N.C5,0.5],[N.D5,0.5],
  // c.4 — G  (tensão: sobe para Sol e pousa em Si)
  [N.B4,0.5],[N.D5,0.5],[N.G5,1.0],[N.B4,1.0],
  // c.5 — C  (variação: escala ascendente que chega ao Dó6)
  [N.C5,0.5],[N.E5,0.5],[N.G5,0.5],[N.C6,0.5],[N.B5,1.0],
  // c.6 — Am (descida lírica)
  [N.A5,0.5],[N.G5,0.5],[N.E5,1.0],[N.C5,1.0],
  // c.7 — F  (arco ascendente em Fá)
  [N.F5,1.0],[N.G5,0.5],[N.A5,0.5],[N.G5,1.0],
  // c.8 — G→C (resolução descendente da Seção A)
  [N.F5,0.5],[N.E5,0.5],[N.D5,0.5],[N.C5,1.5],

  // ── SEÇÃO B ──────────────────────────────────────────────────────
  // c.9 — C  (novo motivo: nota longa + ornamento descendente)
  [N.G5,0.5],[N.A5,0.5],[N.G5,0.5],[N.E5,0.5],[N.D5,1.0],
  // c.10 — Am (frase interrogativa, termina em Si — nota de tensão suave)
  [N.E5,0.5],[N.D5,0.5],[N.C5,0.5],[N.A4,0.5],[N.B4,1.0],
  // c.11 — F  (arpejo melódico ascendente)
  [N.C5,0.5],[N.D5,0.5],[N.F5,0.5],[N.A5,0.5],[N.G5,1.0],
  // c.12 — G  (clímax: escala até Si5, nota mais aguda da peça)
  [N.G5,0.5],[N.A5,0.5],[N.B5,1.0],[N.D5,1.0],
  // c.13 — C  (escala ascendente suave em colcheias — animado mas fluido)
  [N.E5,0.5],[N.G5,0.5],[N.C6,0.5],[N.B5,0.5],[N.A5,0.5],[N.G5,0.5],
  // c.14 — Am (cadência descendente expressiva)
  [N.A5,0.5],[N.G5,0.5],[N.E5,0.5],[N.C5,0.5],[N.A4,1.0],
  // c.15 — F  (construção gradual para o gran finale)
  [N.F5,0.5],[N.G5,0.5],[N.A5,0.5],[N.C6,0.5],[N.A5,1.0],
  // c.16 — G→C (resolução final: escala descendente até o Dó de repouso)
  [N.G5,0.5],[N.F5,0.5],[N.E5,0.5],[N.D5,0.5],[N.C5,2.0]
];

// ══════════════════════════════════════════════════════════════════════
// BAIXO — walking bass (4 compassos · repete 4× para 16 compassos)
// ══════════════════════════════════════════════════════════════════════
var BASS = [
  // C:  raiz · quinta · terça · quinta · raiz · pausa de colcheia
  [N.C3,1.0],[N.G3,0.5],[N.E3,0.5],[N.G3,0.5],[N.C3,0.5],[N.E3,0.5],[N.G3,0.5],
  // Am: raiz · terça · quinta · terça · raiz
  [N.A3,1.0],[N.C4,0.5],[N.E4,0.5],[N.C4,0.5],[N.A3,0.5],[N.C4,0.5],[N.A3,0.5],
  // F:  raiz · terça · quinta · terça · raiz
  [N.F3,1.0],[N.A3,0.5],[N.C4,0.5],[N.A3,0.5],[N.F3,0.5],[N.A3,0.5],[N.F3,0.5],
  // G:  raiz · quinta · sétima(F) · quinta · raiz
  [N.G3,1.0],[N.D4,0.5],[N.F3,0.5],[N.D4,0.5],[N.G3,0.5],[N.B3,0.5],[N.G3,0.5]
];

// ══════════════════════════════════════════════════════════════════════
// MOTOR DE ÁUDIO
// ══════════════════════════════════════════════════════════════════════
function getCtx(){
  if(!audioCtx){
    audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = currentVolume;
    reverbNode = createReverb(audioCtx, 2.2);
    reverbNode.connect(masterGain);
    masterGain.connect(audioCtx.destination);
  }
  return audioCtx;
}

function createReverb(ctx, duration){
  var conv   = ctx.createConvolver();
  var rate   = ctx.sampleRate;
  var length = Math.floor(rate * duration);
  var buf    = ctx.createBuffer(2, length, rate);
  for(var ch=0; ch<2; ch++){
    var data = buf.getChannelData(ch);
    for(var i=0; i<length; i++)
      data[i] = (Math.random()*2-1) * Math.pow(1 - i/length, 2.8);
  }
  conv.buffer = buf;
  return conv;
}

// ── Piano de cauda: sine + triangle + harmônico 2× + ADSR ───────────
function playPiano(freq, startTime, duration, volume, wet){
  var ctx = getCtx();
  wet = (wet !== undefined) ? wet : 0.20;

  var osc1 = ctx.createOscillator(); osc1.type='sine';     osc1.frequency.value = freq;
  var osc2 = ctx.createOscillator(); osc2.type='triangle'; osc2.frequency.value = freq;
  var osc3 = ctx.createOscillator(); osc3.type='sine';     osc3.frequency.value = freq * 2;
  var osc4 = ctx.createOscillator(); osc4.type='sine';     osc4.frequency.value = freq * 3; // 3º harmônico

  var g1=ctx.createGain(); g1.gain.value=0.52;
  var g2=ctx.createGain(); g2.gain.value=0.24;
  var g3=ctx.createGain(); g3.gain.value=0.14;
  var g4=ctx.createGain(); g4.gain.value=0.05;

  osc1.connect(g1); osc2.connect(g2); osc3.connect(g3); osc4.connect(g4);

  var env     = ctx.createGain();
  var attack  = 0.012;                              // ataque 12ms — elimina clique no inicio
  var decay   = 0.14;
  var sustain = 0.52;
  var release = Math.min(duration * 0.40, 0.45);
  var noteEnd = startTime + duration;
  var stopTime = noteEnd + 0.10;                    // cauda extra antes do osc parar

  // Sustain começa só após o decay terminar (evita salto de envelope em notas curtas)
  var sustainStart = Math.max(startTime + attack + decay, noteEnd - release);

  env.gain.setValueAtTime(0, startTime);
  env.gain.linearRampToValueAtTime(volume, startTime + attack);
  env.gain.linearRampToValueAtTime(volume * sustain, startTime + attack + decay);
  if(sustainStart > startTime + attack + decay)
    env.gain.setValueAtTime(volume * sustain, sustainStart);
  env.gain.exponentialRampToValueAtTime(0.0001, noteEnd);
  env.gain.setValueAtTime(0, stopTime - 0.002);     // zero absoluto antes do osc parar

  g1.connect(env); g2.connect(env); g3.connect(env); g4.connect(env);

  var dry = ctx.createGain(); dry.gain.value = 1 - wet;
  var wet2= ctx.createGain(); wet2.gain.value = wet;
  env.connect(dry);  dry.connect(masterGain);
  env.connect(wet2); wet2.connect(reverbNode);

  [osc1,osc2,osc3,osc4].forEach(function(o){
    o.start(startTime); o.stop(stopTime);
  });
}

// ── Acorde com micro-arpejo (voicing natural de piano) ───────────────
function playChord(notes, startTime, duration, volume){
  for(var i=0; i<notes.length; i++)
    playPiano(notes[i], startTime + i*0.016, duration, volume * (i===0 ? 0.65 : 0.48), 0.25);
}

// ── Arpejo em colcheias (1 compasso = 8 colcheias) ───────────────────
function playArpeggio(notes, startTime, volume){
  var step = BEAT * 0.5; // colcheia
  for(var i=0; i<notes.length; i++)
    playPiano(notes[i], startTime + i*step, step * 0.82, volume, 0.12);
}

// ══════════════════════════════════════════════════════════════════════
// SEQUENCIADOR — lookahead scheduler (agenda 300 ms por vez)
// ══════════════════════════════════════════════════════════════════════

var LOOP_DUR   = BAR * 16;   // duração total do loop em segundos
var loopNotes  = [];          // lista plana de todas as notas do loop
var noteIdx    = 0;           // próxima nota a agendar
var loopStart  = 0;           // audioCtx.currentTime em que o loop começou
var LOOKAHEAD  = 0.30;        // agenda notas até 300 ms à frente
var SCHED_INT  = 50;          // checa a cada 50 ms

// Monta a lista de notas uma única vez
function buildLoopNotes(){
  var notes = [];

  // Acordes (4 rep × 4 compassos)
  for(var rep=0; rep<4; rep++){
    for(var c=0; c<4; c++){
      var tC = rep*BAR*4 + c*BAR;
      for(var i=0; i<CHORDS[c].length; i++){
        notes.push({t: tC + i*0.016, f: CHORDS[c][i], d: BAR*0.82,  v: 0.16*(i===0?0.65:0.48), w:0.25});
        notes.push({t: tC+BEAT*2+i*0.016, f: CHORDS[c][i], d: BEAT*0.65, v: 0.09*(i===0?0.65:0.48), w:0.25});
      }
    }
  }

  // Arpejos (4 rep × 4 compassos × 8 notas)
  for(var rep=0; rep<4; rep++){
    for(var c=0; c<4; c++){
      var step = BEAT*0.5;
      for(var i=0; i<8; i++)
        notes.push({t: rep*BAR*4+c*BAR+i*step, f: ARPEGGIOS[c][i], d: step*0.82, v:0.07, w:0.12});
    }
  }

  // Melodia fase 1
  var mt=0;
  for(var m=0; m<MELODY.length; m++){
    var bd=MELODY[m][1]*BEAT;
    notes.push({t:mt, f:MELODY[m][0], d:bd*0.90, v:0.07, w:0.14});
    mt+=bd;
  }

  // Baixo (4 rep × 4 compassos)
  var bt=0;
  for(var rep=0; rep<4; rep++){
    for(var b=0; b<BASS.length; b++){
      var bd=BASS[b][1]*BEAT;
      notes.push({t:bt, f:BASS[b][0], d:bd*0.80, v:0.18, w:0.08});
      bt+=bd;
    }
  }

  notes.sort(function(a,b){ return a.t - b.t; });
  return notes;
}

// Roda a cada SCHED_INT ms e despacha notas dentro da janela
function runScheduler(){
  if(!isPlaying) return;
  var now     = audioCtx.currentTime;
  var horizon = now + LOOKAHEAD;

  while(noteIdx < loopNotes.length){
    var absTime = loopStart + loopNotes[noteIdx].t;
    if(absTime > horizon) break;
    var n = loopNotes[noteIdx];
    playPiano(n.f, absTime, n.d, n.v, n.w);
    noteIdx++;
  }

  // Fim do loop: reinicia
  if(noteIdx >= loopNotes.length){
    var nextLoopStart = loopStart + LOOP_DUR;
    if(nextLoopStart <= horizon + 0.05){
      loopStart = nextLoopStart;
      noteIdx   = 0;
    }
  }

  loopTimeout = setTimeout(runScheduler, SCHED_INT);
}

function scheduleLoop(){
  loopNotes = buildLoopNotes();
  noteIdx   = 0;
  loopStart = audioCtx.currentTime + 0.10;
  runScheduler();
}

function startMusic(){
  if(isPlaying) return;
  isPlaying = true;
  document.getElementById('btnPlay').disabled  = true;
  document.getElementById('btnStop').disabled  = false;
  document.getElementById('playingLabel').classList.add('visible');
  document.getElementById('status').textContent = '🎵 Tocando — "Aventura das Patinhas"';
  getCtx().resume().then(function(){
    if(!isPlaying) return;
    scheduleLoop();
    startViz();
  });
}

function stopMusic(){
  isPlaying = false;
  clearTimeout(loopTimeout);
  stopViz();
  if(audioCtx){ audioCtx.close(); audioCtx=null; masterGain=null; reverbNode=null; }
  document.getElementById('btnPlay').disabled  = false;
  document.getElementById('btnStop').disabled  = true;
  document.getElementById('status').textContent = 'Clique em Play para ouvir';
  document.getElementById('playingLabel').classList.remove('visible');
  resetViz();
}

function setVolume(val){
  currentVolume = val / 100;
  document.getElementById('volVal').textContent = val + '%';
  if(masterGain) masterGain.gain.value = currentVolume;
}

// ── Visualizador ─────────────────────────────────────────────────────
var bars = [];
function buildViz(){
  var viz = document.getElementById('visualizer');
  viz.innerHTML = ''; bars = [];
  for(var i=0; i<24; i++){
    var b = document.createElement('div');
    b.className = 'bar'; viz.appendChild(b); bars.push(b);
  }
}
function startViz(){
  vizInterval = setInterval(function(){
    for(var i=0; i<bars.length; i++){
      var h = 6 + Math.random()*50;
      bars[i].style.height = h + 'px';
    }
  }, 80);
}
function stopViz(){ clearInterval(vizInterval); }
function resetViz(){ for(var i=0; i<bars.length; i++) bars[i].style.height = '4px'; }

buildViz();

// ── Teste rápido de som ───────────────────────────────────────────────
function testBeep(){
  var st = document.getElementById('status');
  var ctx2 = new (window.AudioContext || window.webkitAudioContext)();
  ctx2.resume().then(function(){
    st.textContent = '🔔 Estado AudioContext: ' + ctx2.state;
    var osc  = ctx2.createOscillator();
    var gain = ctx2.createGain();
    osc.type = 'sine';
    osc.frequency.value = 440;
    gain.gain.setValueAtTime(0, ctx2.currentTime);
    gain.gain.linearRampToValueAtTime(0.6, ctx2.currentTime + 0.02);
    gain.gain.setValueAtTime(0.6, ctx2.currentTime + 0.3);
    gain.gain.linearRampToValueAtTime(0, ctx2.currentTime + 0.5);
    osc.connect(gain);
    gain.connect(ctx2.destination);
    osc.start(ctx2.currentTime);
    osc.stop(ctx2.currentTime + 0.6);
    setTimeout(function(){ st.textContent = ctx2.state === 'running' ? '✅ Audio OK — clique Play' : '❌ Audio bloqueado: ' + ctx2.state; }, 700);
  });
}
</script>
